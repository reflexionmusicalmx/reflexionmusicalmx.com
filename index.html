<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reflexión Musical MX</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        html, body { background:#000; color:#FFD700; font-family: 'Merriweather', serif; margin:0; padding:0; width: 100%; height: 100%; overflow: hidden; position: fixed; touch-action: none; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        #loader img { width: 180px; animation: pulse 2s infinite; }

        #starContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        
        #solarSystem { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #sun { width: 200px; z-index: 10; cursor: pointer; animation: pulse 5s infinite; transition: 0.3s; }
        #sun img { width: 100%; }
        @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 15px gold); } 50% { filter: drop-shadow(0 0 50px gold); } }

        /* ORBITAS */
        .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.15); pointer-events: none; }
        #orbitSingles { width: 420px; height: 420px; animation: spin 45s linear infinite; }
        #orbitAlbums { width: 720px; height: 720px; animation: spin 95s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* DISCOS */
        .planet { position: absolute; width: 110px; height: 110px; border-radius: 50%; cursor: pointer; transition: 0.3s; background: #000; box-shadow: 0 0 15px rgba(255,215,0,0.5); pointer-events: auto; }
        .planet:hover { transform: scale(1.3); z-index: 100; box-shadow: 0 0 30px gold; }
        
        /* CONTRA-ROTACIÓN PARA QUE LA IMAGEN Y LA FAMILIA NO SE VOLTEEN */
        .counter { width: 100%; height: 100%; animation: counterSpin 45s linear infinite; position: relative; border-radius: 50%; }
        #orbitAlbums .counter { animation-duration: 95s; }
        @keyframes counterSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        .counter img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* EFECTO FAMILIA - CORREGIDO (Siempre parados de pie) */
        .family-box { position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 6px; opacity: 0; transition: 0.4s; padding: 10px; background: rgba(0,0,0,0.7); border-radius: 10px; border: 1px solid gold; pointer-events: none; }
        .planet:hover .family-box { opacity: 1; bottom: 125%; }
        
        .fig { display: flex; flex-direction: column; align-items: center; }
        .head { width: 10px; height: 10px; background: gold; border-radius: 50%; margin-bottom: 2px; box-shadow: 0 0 5px gold; }
        .body-m { width: 16px; height: 25px; background: gold; border-radius: 4px 4px 0 0; } /* Hombre */
        .body-f { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 25px solid gold; } /* Mujer/Triángulo */
        .child { transform: scale(0.6); transform-origin: bottom; }

        /* CORAZONES */
        .heart-bubble { position: fixed; color: gold; font-size: 24px; pointer-events: none; z-index: 1001; filter: drop-shadow(0 0 5px gold); }

        /* ESTRELLAS FUGACES */
        .shootingStar { position: absolute; width: 40px; height: 40px; cursor: pointer; z-index: 1002; filter: drop-shadow(0 0 8px gold); }
        .supernova { position: absolute; width: 2px; height: 2px; background: white; box-shadow: 0 0 10px white; border-radius: 50%; animation: burst 2s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity:0; } 50% { transform: scale(1.5) rotate(45deg); opacity:1; } 100% { transform: scale(0); opacity:0; } }

        /* REDES SOCIALES */
        .floating-social { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .floating-social a { width: 40px; height: 40px; background: #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid gold; transition: 0.3s; }
        .floating-social a svg { width: 20px; fill: gold; }
        .floating-social a:hover { background: gold; transform: scale(1.1); }
        .floating-social a:hover svg { fill: black; }

        .tooltip { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); background: black; color: gold; padding: 4px 8px; font-size: 10px; border: 1px solid gold; opacity: 0; white-space: nowrap; }
        .planet:hover .tooltip { opacity: 1; }

        @media (max-width: 768px) { #solarSystem { transform: scale(0.45); } }
    </style>
</head>
<body>

    <div id="loader">
        <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Logo">
        <p>REORDENANDO EL COSMOS...</p>
    </div>

    <div id="starContainer"></div>

    <div class="floating-social">
        <a href="https://www.youtube.com/@ReflexionMusicalMX" target="_blank"><svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg></a>
        <a href="https://www.facebook.com/reflexionmusicalmx" target="_blank"><svg viewBox="0 0 320 512"><path d="M279.1 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.4 0 225.4 0c-73.22 0-121.1 44.38-121.1 124.7v70.62H22.89V288h81.39v224h100.2V288z"/></svg></a>
        <a href="https://www.tiktok.com/@reflexionmusicalmx" target="_blank"><svg viewBox="0 0 448 512"><path d="M448 209.9a210.1 210.1 0 0 1 -122.8-39.3V349.4A162.6 162.6 0 1 1 185 188.3V278.2a74.6 74.6 0 1 0 52.2 71.2V0l88 0a121.2 121.2 0 0 0 1.9 22.2h0A122.2 122.2 0 0 0 381 102.4a121.4 121.4 0 0 0 67 20.1z"/></svg></a>
    </div>

    <div id="solarSystem">
        <div id="sun" onclick="location.reload()"><img src="images/REFLEXIÓN MUSICAL MX 1.webp"></div>
        <div id="orbitSingles" class="orbit"></div>
        <div id="orbitAlbums" class="orbit"></div>
    </div>

    <script>
        // Loader
        window.onload = () => setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 800);
        }, 1000);

        // Supernovas (Efecto X)
        function spawnSN() {
            const sn = document.createElement('div');
            sn.className = 'supernova';
            sn.style.left = Math.random() * 100 + '%';
            sn.style.top = Math.random() * 100 + '%';
            document.getElementById('starContainer').appendChild(sn);
            setTimeout(() => sn.remove(), 2000);
        }
        setInterval(spawnSN, 1200);

        const singles = [
            {n:"WE RISE AS ONE", i:"images/We rise as one.webp", l:"https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs"},
            {n:"GRACIAS 2025", i:"images/Gracias 2025.webp", l:"https://music.youtube.com/playlist?list=OLAK5uy_l_KUB_Wa8uMY1p1Sd-DoF71MrNJqvyIXk"},
            {n:"ADULTOS TRASTORNADOS", i:"images/Adultos TRASTORNADOS.webp", l:"https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM"},
            {n:"CODIGO ROJO", i:"images/Codigo rojo.webp", l:"https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0"}
        ];

        const albums = [
            {n:"VOCES DE CAMBIO", i:"images/Voces de Cambio 1.webp", l:"#"},
            {n:"ESTADO CONTRA ESTADO", i:"images/Estado contra estado.webp", l:"#"},
            {n:"TEJIDO VITAL", i:"images/Tejido vital.webp", l:"#"},
            {n:"AMOR EN TIEMPOS", i:"images/Amor en tiempos de ideologias cancerigenas.webp", l:"#"}
        ];

        function build(items, id, radius) {
            const container = document.getElementById(id);
            items.forEach((item, i) => {
                const angle = (i / items.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const p = document.createElement('div');
                p.className = 'planet';
                p.style.left = `calc(50% + ${x}px - 55px)`;
                p.style.top = `calc(50% + ${y}px - 55px)`;
                
                let extra = "";
                // FAMILIA (Dentro de counter para que la rotación la mantenga derecha)
                if(item.n === "TEJIDO VITAL") {
                    extra = `<div class="family-box">
                        <div class="fig"><div class="head"></div><div class="body-m"></div></div>
                        <div class="fig child"><div class="head"></div><div class="body-m"></div></div>
                        <div class="fig child"><div class="head"></div><div class="body-f"></div></div>
                        <div class="fig"><div class="head"></div><div class="body-f"></div></div>
                    </div>`;
                }

                p.innerHTML = `<div class="counter">
                    <img src="${item.i}" onerror="this.src='https://via.placeholder.com/110/000?text=RM'">
                    <div class="tooltip">${item.n}</div>
                    ${extra}
                </div>`;

                // CORAZONES
                if(item.n === "AMOR EN TIEMPOS") {
                    p.onmouseenter = () => {
                        p.hInt = setInterval(() => {
                            const h = document.createElement('div');
                            h.className = 'heart-bubble'; h.innerHTML = '❤';
                            const r = p.getBoundingClientRect();
                            h.style.left = (r.left + 55) + 'px'; h.style.top = (r.top + 55) + 'px';
                            document.body.appendChild(h);
                            h.animate([
                                { transform: 'scale(1)', opacity: 1 },
                                { transform: `translate(${window.innerWidth/2 - r.left - 55}px, ${window.innerHeight/2 - r.top - 55}px) scale(0.5)`, opacity: 1 }
                            ], { duration: 2000 });
                            setTimeout(() => h.remove(), 2000);
                        }, 400);
                    };
                    p.onmouseleave = () => clearInterval(p.hInt);
                }

                p.onclick = () => window.open(item.l, "_blank");
                container.appendChild(p);
            });
        }

        build(singles, "orbitSingles", 210);
        build(albums, "orbitAlbums", 360);

        // PLATAFORMAS (Estrellas Fugaces)
        const platforms = [
            {s:'<svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.84.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.56.3z"/></svg>', l:'#'}, // Spotify
            {s:'<svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg>', l:'#'}, // YouTube
            {s:'<svg viewBox="0 0 640 512"><path d="M116.3 318.8c-6-1.5-12.3-2.3-18.8-2.3-37.4 0-67.8 29.3-67.8 65.5 0 36.1 30.4 65.5 67.8 65.5h414.7c42.1 0 76.2-32.9 76.2-73.4 0-40.6-34.1-73.4-76.2-73.4-6.4 0-12.5.8-18.3 2.3-13.4-53.5-62-92.4-121-92.4-55.9 0-103.5 35.1-118.8 84.1l-25.7-18.1c-19.2-13.5-43.8-21.5-70.2-21.5-63.7 0-115.3 50.8-115.3 113.3 0 16.9 3.8 33 10.6 47.4h66.3c15-43.2 55.4-74.4 104-74.4 60.5 0 109.5 48.3 109.5 107.8h46.7V174.4c0-26.6-21.6-48.2-48.2-48.2-26.6 0-48.2 21.6-48.2 48.2v206.5l-84.5-84.5-55.9 55.9 84.5 84.5V174.4c0-62 50.4-112.4 112.4-112.4s112.4 50.4 112.4 112.4v220h44.4c17.5 0 31.8 14.3 31.8 31.8s-14.3 31.8-31.8 31.8H97.5c-17.5 0-31.8-14.3-31.8-31.8s14.3-31.8 31.8-31.8h18.8z"/></svg>', l:'#'} // SoundCloud
        ];

        function createStar() {
            const p = platforms[Math.floor(Math.random()*platforms.length)];
            const s = document.createElement('div');
            s.className = 'shootingStar';
            s.innerHTML = `<div style="fill:gold">${p.s}</div>`;
            const startX = Math.random() * window.innerWidth;
            s.style.left = startX + 'px'; s.style.top = '-50px';
            document.getElementById('starContainer').appendChild(s);
            s.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*500}px, ${window.innerHeight + 100}px) rotate(360deg)`, opacity: 0 }
            ], { duration: 8000 });
            s.onclick = () => window.open(p.l, "_blank");
            setTimeout(() => s.remove(), 8000);
        }
        setInterval(createStar, 3000);
    </script>
</body>
</html>
