<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Descubre la discografía completa de Reflexión Musical MX. Rap, Folk y educación emocional desde Guadalajara.">
    <meta name="author" content="Reflexión Musical MX">

    <title>Reflexión Musical MX | El Universo</title>

    <link rel="preload" as="image" href="images/REFLEXIÓN MUSICAL MX 1.webp" fetchpriority="high">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <link rel="apple-touch-icon" href="images/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* BLOQUEO PARA MÓVILES Y ESTÉTICA BASE */
        html, body {
            background: #000;
            color: #FFD700;
            font-family: 'Merriweather', serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            text-align: center;
            overscroll-behavior: none;
            touch-action: none;
        }

        /* CAJA DE CRISTAL PARA ESTRELLAS FUGACES */
        #starContainer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1000;
        }

        /* PANTALLA DE CARGA */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            will-change: opacity;
        }

        #loader img {
            width: 180px;
            animation: pulse 2s infinite;
        }

        #loader p {
            color: #FFD700;
            margin-top: 25px;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 14px;
        }

        /* FONDO ESTÁTICO (CANVAS) */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* SISTEMA SOLAR */
        #solarSystem {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            will-change: transform;
        }

        /* LOGO CENTRAL (EL SOL) */
        #sun {
            position: absolute;
            width: 200px;
            z-index: 10;
            animation: pulse 5s infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        #sun:hover { transform: scale(1.1); }
        #sun img { width: 100%; filter: drop-shadow(0 0 20px gold); }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 15px gold); }
            50% { filter: drop-shadow(0 0 45px gold); }
            100% { filter: drop-shadow(0 0 15px gold); }
        }

        /* MODALES */
        .modal {
            display: none;
            position: fixed;
            z-index: 100000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.4s ease;
            align-items: center;
            justify-content: center;
            touch-action: auto;
        }

        .modal.show { display: flex; opacity: 1; }

        .modal-content {
            background: #0a0a0a;
            border: 1px solid #FFD700;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 85%;
            max-height: 85vh;
            overflow-y: auto;
            text-align: left;
            position: relative;
            box-shadow: 0 0 50px rgba(255,215,0,0.15);
        }

        .modal-content h2 { color: #FFD700; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }

        .close-modal {
            position: absolute;
            right: 20px; top: 15px;
            color: #FFD700; font-size: 35px; font-weight: bold;
            cursor: pointer; z-index: 11;
        }

        /* TRACKLIST Y REPRODUCTOR */
        .tracklist-container {
            max-height: 250px;
            overflow-y: auto;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid rgba(255,215,0,0.1);
        }

        .track-link {
            display: block;
            padding: 10px;
            color: #eee;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
            transition: 0.2s;
        }

        .track-link:hover { background: rgba(255, 215, 0, 0.15); padding-left: 15px; }
        .active-track { background: #FFD700; color: #000; font-weight: bold; border-radius: 5px; }

        /* ÓRBITAS Y PLANETAS */
        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,215,0,0.1);
            pointer-events: none;
        }

        #orbitSingles { width: 420px; height: 420px; animation: spin 50s linear infinite; }
        #orbitAlbums { width: 720px; height: 720px; animation: spin 100s linear infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .planet {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            background: #000;
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
            pointer-events: auto;
        }

        .planet:hover { transform: scale(1.2); z-index: 100; box-shadow: 0 0 30px gold; }

        .counter { width: 100%; height: 100%; animation: counterSpin 50s linear infinite; border-radius: 50%; overflow: hidden; position: relative; }
        #orbitAlbums .counter { animation-duration: 100s; }

        @keyframes counterSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        .counter img { width: 100%; height: 100%; object-fit: cover; }

        /* TOOLTIPS */
        .tooltip {
            position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: gold; padding: 5px 10px;
            font-size: 10px; border: 1px solid gold; border-radius: 4px;
            opacity: 0; transition: 0.3s; white-space: nowrap;
        }
        .planet:hover .tooltip { opacity: 1; bottom: -40px; }

        /* FRASES FLOTANTES */
        .floating-quote {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: #fff; border: 1px solid gold;
            padding: 25px; border-radius: 15px; text-align: center;
            z-index: 100001; max-width: 80%; box-shadow: 0 0 40px gold;
        }

        /* RESPONSIVIDAD */
        @media (max-width: 768px) {
            #solarSystem { transform: scale(0.5); }
            .modal-content { width: 90%; padding: 20px; }
        }
    </style>
</head>

<body>

<div id="loader">
    <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Cargando">
    <p>INICIANDO UNIVERSO...</p>
</div>

<canvas id="bg"></canvas>
<div id="starContainer"></div>

<audio id="bioAudio" src="pista-fondo.mp3" loop preload="none"></audio>

<div id="bioModal" class="modal">
    <div class="modal-content">
        <span class="close-modal close-bio">×</span>
        <h2>Reflexión Musical MX</h2>
        <p>Este proyecto utiliza la música para hablar de lo que muchas veces se evita: educación emocional, conciencia social y el futuro de la humanidad.</p>
        <p>¿Eres lo que escuchas?</p>
        <hr style="border: 0; border-top: 1px solid gold; margin: 20px 0;">
        <p style="font-style: italic; text-align: center;">Próximamente: "Algo está mal" (Libro)</p>
    </div>
</div>

<div id="albumModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <span class="close-modal close-album">×</span>
        <h2 id="modalAlbumTitle">Título</h2>
        <div id="modalPlayerContainer" style="margin-bottom: 15px;"></div>
        <div class="tracklist-container" id="modalTracklist"></div>
        <div id="modalPlatforms" style="display: flex; justify-content: center; gap: 15px;"></div>
    </div>
</div>

<div id="solarSystem">
    <div id="sun" title="Biografía">
        <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Sol">
    </div>
    <div id="orbitSingles" class="orbit"></div>
    <div id="orbitAlbums" class="orbit"></div>
</div>

<script>
    // DATOS DE LAS FRASES (Iguales a las tuyas)
    const quotesData = [
        { text: "El silencio pesa más que las balas.", song: "Ciudad en silencio", album: "Voces de Cambio 1" },
        // ... (Agrega aquí el resto de tus frases para que el script las use)
    ];

    // LÓGICA DE LAS ESTRELLAS (CANVAS)
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5, o: Math.random() });
        }
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 215, 0, ${Math.abs(Math.sin(Date.now() * 0.001 + s.o))})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    initStars(); draw();

    // LÓGICA DE REPRODUCTOR Y MODALES
    document.addEventListener("DOMContentLoaded", () => {
        const sun = document.getElementById("sun");
        const bioModal = document.getElementById("bioModal");
        const albumModal = document.getElementById("albumModal");

        // Abrir Bio
        sun.onclick = () => {
            bioModal.classList.add("show");
            document.getElementById("bioAudio").play().catch(() => {});
        };

        // Cerrar Modales
        document.querySelectorAll(".close-modal").forEach(btn => {
            btn.onclick = () => {
                bioModal.classList.remove("show");
                albumModal.classList.remove("show");
                document.getElementById("modalPlayerContainer").innerHTML = ""; // Detener video
                document.getElementById("bioAudio").pause();
            };
        });

        // Función para extraer ID de Youtube
        function getYTId(url) {
            const match = url.match(/[?&]v=([^&]+)/);
            return match ? match[1] : null;
        }

        // Crear Órbitas (Sencillos y Álbumes)
        // Aquí usarías tus arrays 'singles' y 'albums'
        window.createOrbit = function(data, containerId, radius) {
            const container = document.getElementById(containerId);
            data.forEach((item, i) => {
                const angle = (i / data.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const p = document.createElement("div");
                p.className = "planet";
                p.style.left = `calc(50% + ${x}px - 50px)`;
                p.style.top = `calc(50% + ${y}px - 50px)`;
                
                p.innerHTML = `<div class="counter"><img src="${item.img}"><div class="tooltip">${item.title}</div></div>`;
                
                p.onclick = () => {
                    document.getElementById("modalAlbumTitle").innerText = item.title;
                    const tracklist = document.getElementById("modalTracklist");
                    tracklist.innerHTML = "";
                    
                    // Playlist inicial
                    const listMatch = item.links.youtube.match(/[?&]list=([^&]+)/);
                    const playlistId = listMatch ? listMatch[1] : "";

                    item.tracks.forEach(t => {
                        const link = document.createElement("a");
                        link.className = "track-link";
                        link.href = "#";
                        link.innerText = t.name;
                        link.onclick = (e) => {
                            e.preventDefault();
                            const vId = getYTId(t.url);
                            let embed = `https://www.youtube.com/embed/${vId}?autoplay=1`;
                            if(playlistId) embed += `&list=${playlistId}`;
                            document.getElementById("modalPlayerContainer").innerHTML = `<iframe width="100%" height="250" src="${embed}" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
                        };
                        tracklist.appendChild(link);
                    });
                    albumModal.classList.add("show");
                };
                container.appendChild(p);
            });
        };
    });

    // Quitar Loader
    window.onload = () => {
        setTimeout(() => {
            document.getElementById("loader").style.opacity = "0";
            setTimeout(() => document.getElementById("loader").remove(), 800);
        }, 1000);
    };
</script>

</body>
</html>
