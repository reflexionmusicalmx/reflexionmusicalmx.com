    <style>
        /* ============================================================
           CSS RESET Y CONFIGURACIÓN DE NÚCLEO
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: #000000;
            color: #FFD700;
            font-family: 'Merriweather', serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
            text-align: center;
            line-height: 1.6;
        }

        /* ============================================================
           SISTEMA DE CAPAS (Z-INDEX)
           ============================================================ */
        #bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
        }

        #starContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1000;
        }

        /* ============================================================
           PANTALLA DE CARGA (LOADER)
           ============================================================ */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
        }

        #loader img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
            animation: pulseSun 2s infinite ease-in-out;
        }

        #loader p {
            color: #FFD700;
            margin-top: 30px;
            font-weight: 700;
            letter-spacing: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* ============================================================
           SISTEMA SOLAR Y ÓRBITAS
           ============================================================ */
        #solarSystem {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        #sun {
            position: absolute;
            width: 220px;
            height: 220px;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sun:hover {
            transform: scale(1.1);
        }

        #sun img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px gold);
            animation: sunGlow 4s infinite alternate ease-in-out;
        }

        @keyframes sunGlow {
            from { filter: drop-shadow(0 0 15px gold) brightness(1); }
            to { filter: drop-shadow(0 0 50px gold) brightness(1.2); }
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.07);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #orbitSingles {
            width: 440px;
            height: 440px;
            animation: rotateOrbit 60s linear infinite;
        }

        #orbitAlbums {
            width: 760px;
            height: 760px;
            animation: rotateOrbit 120s linear infinite;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ============================================================
           PLANETAS (DISCOS)
           ============================================================ */
        .planet {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            cursor: pointer;
            background: #000;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            transition: all 0.4s ease;
            z-index: 50;
        }

        .planet:hover {
            transform: scale(1.3);
            box-shadow: 0 0 40px gold;
            z-index: 200;
            border: 2px solid gold;
        }

        .planet img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* ============================================================
           MODALES (BIOGRAFÍA Y ÁLBUM)
           ============================================================ */
        .modal {
            display: none;
            position: fixed;
            z-index: 200000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #000;
            border: 1px solid #FFD700;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 15px;
            color: #FFD700;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-modal:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        /* ============================================================
           REPRODUCTOR MAESTRO (BLACK & GOLD)
           ============================================================ */
        #customPlayerBox {
            display: none;
            flex-direction: column;
            margin-bottom: 25px;
            background: #000;
            border: 1px solid gold;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #playerIframeContainer {
            width: 100%;
            height: 140px;
            background: #000;
            position: relative;
        }

        /* ESTILO SOUNDCLOUD: FONDO NEGRO, ONDA GRIS, PROGRESO DORADO */
        #sc-iframe {
            filter: invert(1) hue-rotate(180deg) brightness(1.1) contrast(1.4);
            position: absolute;
            top: 0;
            left: 140px;
            width: calc(100% - 140px);
            height: 140px;
            border: none;
            z-index: 1;
        }

        .sc-cover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 140px;
            height: 140px;
            object-fit: cover;
            z-index: 10;
            border-right: 1px solid rgba(255, 215, 0, 0.4);
        }

        .custom-player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 45px;
            padding: 18px;
            background: linear-gradient(to bottom, #000, #0a0a0a);
            border-top: 1px solid rgba(255, 215, 0, 0.25);
        }

        .ctrl-btn {
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            transform: scale(1.2);
        }

        /* VOLUMEN DEL REPRODUCTOR */
        .player-volume-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #playerVolSlider {
            width: 80px;
            accent-color: #FFD700;
            cursor: pointer;
            height: 4px;
        }

        /* ============================================================
           LISTA DE CANCIONES (TRACKLIST)
           ============================================================ */
        .tracklist-container {
            text-align: left;
            max-height: 220px;
            overflow-y: auto;
            background: rgba(255, 215, 0, 0.04);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            margin-bottom: 25px;
        }

        .tracklist-container::-webkit-scrollbar { width: 5px; }
        .tracklist-container::-webkit-scrollbar-thumb { background: gold; border-radius: 10px; }

        .track-item-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.06);
        }

        .track-link {
            cursor: pointer;
            color: #ddd;
            text-decoration: none;
            font-size: 15px;
            flex: 1;
            transition: 0.2s;
        }

        .track-link:hover { color: gold; padding-left: 5px; }

        .active-track {
            color: #000 !important;
            background: #FFD700;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 6px;
        }

        /* ============================================================
           BARRAS LATERALES (REDES Y STREAMING)
           ============================================================ */
        .floating-social, .floating-platforms {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10000;
        }

        .floating-social { left: 30px; }
        .floating-platforms { right: 30px; }

        .floating-social a, .floating-platforms a {
            background: #000;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            border: 1px solid gold;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .floating-social a:hover, .floating-platforms a:hover {
            background: gold;
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
        }

        .floating-social svg, .floating-platforms svg {
            fill: #FFD700;
            width: 26px;
            height: 26px;
            transition: 0.3s;
        }

        .floating-social a:hover svg, .floating-platforms a:hover svg {
            fill: #000;
        }

        /* ============================================================
           RESPONSIVIDAD MÓVIL (EL CAMBIO DE BARRAS)
           ============================================================ */
        @media (max-width: 768px) {
            #solarSystem { transform: scale(0.4); }

            /* Streaming se mueve ARRIBA horizontalmente */
            .floating-platforms {
                top: 30px;
                bottom: auto;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                width: 95%;
                justify-content: center;
                gap: 12px;
            }

            /* Redes se mueven ABAJO horizontalmente */
            .floating-social {
                top: auto;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                width: 95%;
                justify-content: center;
                gap: 12px;
            }

            .floating-social a, .floating-platforms a {
                width: 42px;
                height: 42px;
            }

            .modal-content {
                padding: 25px;
                width: 90%;
            }

            #sc-iframe { left: 110px; width: calc(100% - 110px); }
            .sc-cover-overlay { width: 110px; }
        }

        /* ============================================================
           COMETAS Y EFECTOS COSMICOS
           ============================================================ */
        .comet-container {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            pointer-events: auto;
        }

        .comet-head {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px gold;
        }

        .comet-text {
            position: absolute;
            top: 30px;
            background: rgba(0,0,0,0.9);
            border: 1px solid gold;
            color: gold;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transform: scale(0);
            transition: 0.5s;
        }

        .comet-container.revealed .comet-text {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>

/**
 * Actualiza el estado visual del botón Play/Pause central.
 * Utiliza los SVGs definidos en la Parte 2 (Círculo Dorado / Icono Negro).
 */
function setPlayerState(isPlaying) {
    const btn = document.getElementById('btnPlayPause');
    if (btn) {
        btn.innerHTML = isPlaying ? pauseIconSVG : playIconSVG;
    }
}

/* ============================================================
   INICIALIZACIÓN DEL UNIVERSO (DOM CONTENT LOADED)
   ============================================================ */
document.addEventListener("DOMContentLoaded", () => {
    // Referencias a elementos del DOM
    const loader = document.getElementById('loader');
    const modalBio = document.getElementById("bioModal");
    const sunElement = document.getElementById("sun");
    const closeBioBtn = document.querySelector(".close-bio");
    const bioAudioTrack = document.getElementById("bioAudio"); 
    const bioVolumeInput = document.getElementById("volumeSlider");
    const bioMuteBtn = document.getElementById("muteBtn");
    const effectsContainer = document.getElementById("starContainer"); 
    const modalAlbum = document.getElementById("albumModal");
    const closeAlbumBtn = document.querySelector(".close-album");
    const albumTracklist = document.getElementById("modalTracklist");
    const albumPlatformsContainer = document.getElementById("modalPlatforms");
    const customPlayerUI = document.getElementById("customPlayerBox");
    const playerMasterVolume = document.getElementById("playerVolSlider");

    /* --- GESTIÓN DEL LOADER --- */
    if (loader) {
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1000);
        }, 1500); 
    }

    /* --- CONTROL DE AUDIO DE BIOGRAFÍA --- */
    if (bioVolumeInput && bioAudioTrack) {
        bioAudioTrack.volume = bioVolumeInput.value;
        bioVolumeInput.addEventListener("input", (e) => {
            bioAudioTrack.volume = e.target.value;
            if (bioMuteBtn) {
                bioMuteBtn.textContent = bioAudioTrack.volume == 0 ? "🔇" : "🔊";
            }
        });
    }
    
    if (bioMuteBtn && bioAudioTrack) {
        bioMuteBtn.addEventListener("click", () => {
            if (bioAudioTrack.volume > 0) {
                bioAudioTrack.dataset.savedVol = bioAudioTrack.volume; 
                bioAudioTrack.volume = 0;
                bioVolumeInput.value = 0;
                bioMuteBtn.textContent = "🔇";
            } else {
                const volToRestore = bioAudioTrack.dataset.savedVol || 0.4;
                bioAudioTrack.volume = volToRestore;
                bioVolumeInput.value = volToRestore;
                bioMuteBtn.textContent = "🔊";
            }
        });
    }

    /* --- SINCRONIZACIÓN DE VOLUMEN MAESTRO --- */
    if (playerMasterVolume) {
        playerMasterVolume.addEventListener("input", (e) => {
            let currentVol = parseInt(e.target.value, 10);
            if (scWidgetGlobal) {
                try { scWidgetGlobal.setVolume(currentVol); } catch(err) { console.error("SC Vol Error", err); }
            }
            if (ytPlayerGlobal && typeof ytPlayerGlobal.setVolume === 'function') {
                try { ytPlayerGlobal.setVolume(currentVol); } catch(err) { console.error("YT Vol Error", err); }
            }
        });
    }

    /* --- FUNCIONES DE CIERRE DE VENTANAS --- */
    function stopAllMediaAndClose() {
        modalBio.classList.remove("show");
        if (bioAudioTrack) {
            bioAudioTrack.pause();
            bioAudioTrack.currentTime = 0;
        }
    }

    function closeAlbumPanel() {
        modalAlbum.classList.remove("show");
        if (scWidgetGlobal) {
            try { scWidgetGlobal.pause(); } catch(e) {}
        }
        if (ytPlayerGlobal && typeof ytPlayerGlobal.pauseVideo === 'function') {
            try { ytPlayerGlobal.pauseVideo(); } catch(e) {}
        }
        // Limpieza de recursos para evitar fugas de memoria
        setTimeout(() => {
            customPlayerUI.style.display = "none";
            document.getElementById("playerIframeContainer").innerHTML = "";
            albumTracklist.innerHTML = "";
            scWidgetGlobal = null;
            ytPlayerGlobal = null;
            setPlayerState(false);
        }, 500);
    }

    /* --- ASIGNACIÓN DE EVENTOS DE INTERACCIÓN --- */
    if (sunElement) {
        sunElement.onclick = () => { 
            modalBio.classList.add("show"); 
            if (bioAudioTrack) { 
                bioAudioTrack.play().catch(e => console.warn("Autoplay bloqueado por el navegador. Requiere clic previo.")); 
            }
        };
    }

    if (closeBioBtn) closeBioBtn.addEventListener('click', stopAllMediaAndClose);
    if (closeAlbumBtn) closeAlbumBtn.addEventListener('click', closeAlbumPanel);

    window.addEventListener('click', (e) => {
        if (e.target === modalBio) stopAllMediaAndClose();
        if (e.target === modalAlbum) closeAlbumPanel();
    });

    /* ============================================================
       SISTEMA DE FONDO: ESTRELLAS DINÁMICAS (CANVAS)
       ============================================================ */
    const starCanvas = document.getElementById("bg");
    const starCtx = starCanvas.getContext("2d");
    let backgroundStarsArray = [];
    const starDensity = window.innerWidth < 768 ? 100 : 350;

    function initializeStarfield() {
        backgroundStarsArray = [];
        for (let i = 0; i < starDensity; i++) {
            backgroundStarsArray.push({
                posX: Math.random() * starCanvas.width,
                posY: Math.random() * starCanvas.height,
                radius: Math.random() * 1.6,
                opacity: Math.random(),
                blinkSpeed: 0.005 + Math.random() * 0.012
            });
        }
    }

    function renderStarfieldFrame() {
        starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        backgroundStarsArray.forEach(star => {
            star.opacity += star.blinkSpeed;
            if (star.opacity >= 1 || star.opacity <= 0.1) star.blinkSpeed *= -1;
            starCtx.fillStyle = `rgba(255, 215, 0, ${star.opacity})`;
            starCtx.beginPath();
            starCtx.arc(star.posX, star.posY, star.radius, 0, Math.PI * 2);
            starCtx.fill();
        });
        requestAnimationFrame(renderStarfieldFrame);
    }

    function handleStarfieldResize() {
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;
        initializeStarfield();
    }

    handleStarfieldResize();
    window.addEventListener('resize', handleStarfieldResize);
    renderStarfieldFrame();

    /* ============================================================
       EFECTOS COSMICOS: SUPERNOVAS
       ============================================================ */
    function clearSupernovas() {
        document.querySelectorAll('.supernova-hitbox').forEach(sn => sn.remove());
    }

    function generateSupernovaBurst() {
        clearSupernovas();
        const burstCount = 3;
        for (let i = 0; i < burstCount; i++) {
            const hitbox = document.createElement("div");
            hitbox.className = "supernova-hitbox";
            hitbox.style.left = (Math.random() * window.innerWidth) + "px";
            hitbox.style.top = (Math.random() * window.innerHeight) + "px";
            
            const flashCore = document.createElement("div");
            flashCore.className = "supernova";
            
            hitbox.appendChild(flashCore);
            if (effectsContainer) effectsContainer.appendChild(hitbox);
        }
        // Auto-regeneración cada 6-10 segundos
        setTimeout(generateSupernovaBurst, 6000 + Math.random() * 4000); 
    }
    generateSupernovaBurst();

    /* ============================================================
       MOTOR DEL REPRODUCTOR (RENDER TRACK)
       ============================================================ */
    window.renderTrack = function(trackIndex) {
        activeTrackIndexGlobal = trackIndex;
        const currentTrack = activeTracksGlobal[trackIndex];
        const iframeBox = document.getElementById("playerIframeContainer");
        const playerUI = document.getElementById("customPlayerBox");
        
        // Actualizar UI de lista
        document.querySelectorAll('.track-link').forEach((link, idx) => {
            if (idx === trackIndex) link.classList.add('active-track');
            else link.classList.remove('active-track');
        });

        playerUI.style.display = "flex";

        if (currentTrack.url.includes("soundcloud.com")) {
            const scEncodedUrl = encodeURIComponent(currentTrack.url);
            
            /**
             * CONFIGURACIÓN COLOR DORADO:
             * color=%23ffd700 -> Esto define la onda activa en Dorado.
             * show_artwork=false -> Oculta el arte nativo de SC para usar nuestra portada.
             */
            const scEmbedParams = `https://w.soundcloud.com/player/?url=${scEncodedUrl}&color=%23ffd700&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false&show_artwork=false`;
            
            iframeBox.innerHTML = `
                <img src="${activeAlbumImgGlobal}" class="sc-cover-overlay" alt="Reflexión Musical MX">
                <iframe id="sc-iframe" scrolling="no" allow="autoplay" src="${scEmbedParams}"></iframe>
            `;
            
            setPlayerState(false);

            setTimeout(() => {
                const iframeElement = document.getElementById('sc-iframe');
                if (iframeElement && window.SC) {
                    scWidgetGlobal = SC.Widget(iframeElement);
                    scWidgetGlobal.bind(SC.Widget.Events.READY, () => {
                        scWidgetGlobal.play(); 
                        if (playerMasterVolume) {
                            scWidgetGlobal.setVolume(parseInt(playerMasterVolume.value, 10));
                        }
                        scWidgetGlobal.bind(SC.Widget.Events.PLAY, () => setPlayerState(true));
                        scWidgetGlobal.bind(SC.Widget.Events.PAUSE, () => setPlayerState(false));
                        scWidgetGlobal.bind(SC.Widget.Events.FINISH, () => {
                            if (activeTrackIndexGlobal < activeTracksGlobal.length - 1) {
                                window.renderTrack(activeTrackIndexGlobal + 1);
                            }
                        });
                    });
                }
            }, 600);

        } else if (currentTrack.url.includes("youtube.com")) {
            // Lógica para videos de YouTube (si se integran en el futuro)
            let ytVideoId = "";
            let match = currentTrack.url.match(/[?&]v=([^&]+)/);
            if (match) ytVideoId = match[1];
            
            if (ytVideoId) {
                setPlayerState(false);
                let ytEmbed = `https://www.youtube.com/embed/${ytVideoId}?autoplay=1&enablejsapi=1`;
                iframeBox.innerHTML = `<iframe id="yt-iframe" width="100%" height="140" src="${ytEmbed}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius: 12px 12px 0 0;"></iframe>`;
                
                setTimeout(() => {
                    if (window.YT && window.YT.Player) {
                        ytPlayerGlobal = new YT.Player('yt-iframe', {
                            events: {
                                'onReady': (ev) => {
                                    ev.target.playVideo();
                                    if(playerMasterVolume) ev.target.setVolume(parseInt(playerMasterVolume.value, 10));
                                },
                                'onStateChange': (ev) => {
                                    if (ev.data === YT.PlayerState.PLAYING) setPlayerState(true);
                                    else if (ev.data === YT.PlayerState.PAUSED) setPlayerState(false);
                                    else if (ev.data === YT.PlayerState.ENDED) {
                                        if (activeTrackIndexGlobal < activeTracksGlobal.length - 1) window.renderTrack(activeTrackIndexGlobal + 1);
                                    }
                                }
                            }
                        });
                    }
                }, 1000);
            }
        }
    };

    /* --- CONTROLES DE LA BOTONERA CENTRAL --- */
    document.getElementById('btnNext').onclick = () => {
        if (activeTrackIndexGlobal < activeTracksGlobal.length - 1) window.renderTrack(activeTrackIndexGlobal + 1);
    };
    
    document.getElementById('btnPrev').onclick = () => {
        if (activeTrackIndexGlobal > 0) window.renderTrack(activeTrackIndexGlobal - 1);
    };
    
    document.getElementById('btnPlayPause').onclick = () => {
        if (scWidgetGlobal) {
            scWidgetGlobal.toggle();
        } else if (ytPlayerGlobal && typeof ytPlayerGlobal.getPlayerState === 'function') {
            const ytState = ytPlayerGlobal.getPlayerState();
            if (ytState === 1 || ytState === 3) ytPlayerGlobal.pauseVideo();
            else ytPlayerGlobal.playVideo();
        }
    };

    /* ============================================================
       CONSTRUCCIÓN ÓRGANICA DEL SISTEMA SOLAR
       ============================================================ */
    function generateOrbitLayout(data, orbitId, radiusDistance) {
        const orbitContainer = document.getElementById(orbitId);
        if (!orbitContainer) return;
        const domFragment = document.createDocumentFragment();
        
        data.forEach((item, index) => {
            const anglePos = (index / data.length) * Math.PI * 2;
            const posX = Math.cos(anglePos) * radiusDistance;
            const posY = Math.sin(anglePos) * radiusDistance;
            
            const planetDisc = document.createElement("div");
            planetDisc.className = "planet";
            planetDisc.style.left = `calc(50% + ${posX}px - 55px)`;
            planetDisc.style.top = `calc(50% + ${posY}px - 55px)`;

            planetDisc.onclick = () => {
                // Detener audio de bio si está sonando
                if (bioAudioTrack && !bioAudioTrack.paused) {
                    bioAudioTrack.pause();
                }
                
                document.getElementById("modalAlbumTitle").innerText = item.title;
                albumTracklist.innerHTML = "";
                customPlayerUI.style.display = "none";
                document.getElementById("playerIframeContainer").innerHTML = "";

                activeTracksGlobal = item.tracks || [];

    /* ============================================================
       SISTEMA DE COMETAS (PRÓXIMOS LANZAMIENTOS)
       ============================================================ */
    const cometNews = [
        "📖 LIBRO: ALGO ESTÁ MAL",
        "💿 NUEVO ÁLBUM 2026",
        "🎵 PRÓXIMO SENCILLO"
    ];
    let newsPointer = 0;

    function spawnCosmicComet() {
        try {
            const currentNews = cometNews[newsPointer];
            newsPointer = (newsPointer + 1) % cometNews.length;

            const cometObj = document.createElement("div");
            cometObj.className = "comet-container";
            cometObj.innerHTML = `
                <div class="comet-tail" style="position:absolute; width:150px; height:2px; background:linear-gradient(to right, gold, transparent); transform-origin: left center;"></div>
                <div class="comet-head"></div>
                <div class="comet-text">${currentNews}</div>
            `;
            
            if (effectsContainer) effectsContainer.appendChild(cometObj); 

            let sX, sY, eX, eY;
            const spawnEdge = Math.floor(Math.random() * 4); 
            const pad = 120;
            
            if (spawnEdge === 0) { sX = Math.random() * window.innerWidth; sY = -pad; eX = Math.random() * window.innerWidth; eY = window.innerHeight + pad; }
            else if (spawnEdge === 1) { sX = window.innerWidth + pad; sY = Math.random() * window.innerHeight; eX = -pad; eY = Math.random() * window.innerHeight; }
            else if (spawnEdge === 2) { sX = Math.random() * window.innerWidth; sY = window.innerHeight + pad; eX = Math.random() * window.innerWidth; eY = -pad; }
            else { sX = -pad; sY = Math.random() * window.innerHeight; eX = window.innerWidth + pad; eY = Math.random() * window.innerHeight; }

            cometObj.style.left = sX + "px";
            cometObj.style.top = sY + "px";

            const deltaX = eX - sX; 
            const deltaY = eY - sY;
            const cometAngle = Math.atan2(deltaY, deltaX) * (180 / Math.PI); 

            const tail = cometObj.querySelector('.comet-tail');
            tail.style.transform = `rotate(${cometAngle}deg)`;

            const cometDuration = 10000 + Math.random() * 5000;
            const cometAnim = cometObj.animate([
                { transform: "translate(0px, 0px)" },
                { transform: `translate(${deltaX}px, ${deltaY}px)` }
            ], { duration: cometDuration, easing: "linear" });

            let isRevealed = false;
            cometObj.onclick = () => {
                if (isRevealed) return;
                isRevealed = true;
                cometAnim.pause();
                cometObj.classList.add("revealed");
                setTimeout(() => {
                    cometObj.style.opacity = '0';
                    setTimeout(() => { cometObj.remove(); spawnCosmicComet(); }, 600);
                }, 3500);
            };

            cometAnim.onfinish = () => {
                if (!isRevealed) {
                    cometObj.remove();
                    setTimeout(spawnCosmicComet, 1500);
                }
            };
        } catch (err) { console.error("Comet logic error:", err); }
    }

    // Retraso inicial para los cometas
    setTimeout(spawnCosmicComet, 4000);
