<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reflexión Musical MX - Universo Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS DE FONDO Y CUERPO */
        html, body { 
            background:#000; 
            color:#FFD700; 
            font-family: 'Merriweather', serif; 
            margin:0; padding:0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            position: fixed; 
            touch-action: none; 
        }
        
        /* PANTALLA DE CARGA */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.8s; 
        }
        #loader img { width: 180px; animation: pulseLoader 2s infinite; }
        @keyframes pulseLoader { 
            0%, 100% { filter: drop-shadow(0 0 5px gold); transform: scale(1); } 
            50% { filter: drop-shadow(0 0 20px gold); transform: scale(1.05); } 
        }

        /* CONTENEDOR DE EFECTOS (Estrellas y Supernovas) */
        #starContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        
        /* SISTEMA SOLAR */
        #solarSystem { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
        }
        #sun { 
            width: 200px; z-index: 10; cursor: pointer; 
            animation: pulseSun 5s infinite; transition: 0.3s; 
        }
        #sun img { width: 100%; }
        @keyframes pulseSun { 
            0%, 100% { filter: drop-shadow(0 0 15px gold); } 
            50% { filter: drop-shadow(0 0 60px gold); } 
        }

        /* ORBITAS CIRCULARES */
        .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.15); pointer-events: none; }
        #orbitSingles { width: 420px; height: 420px; animation: spin 45s linear infinite; }
        #orbitAlbums { width: 720px; height: 720px; animation: spin 95s linear infinite; }
        
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* ICONOS DE DISCOS (PLANETAS) */
        .planet { 
            position: absolute; width: 110px; height: 110px; 
            border-radius: 50%; cursor: pointer; transition: 0.3s; 
            background: #000; box-shadow: 0 0 15px rgba(255,215,0,0.5); 
            pointer-events: auto; 
        }
        .planet:hover { transform: scale(1.35); z-index: 100; box-shadow: 0 0 35px gold; }
        
        /* CONTRA-ROTACIÓN: Esto mantiene las imágenes y la familia derechas */
        .counter { 
            width: 100%; height: 100%; 
            animation: counterSpin 45s linear infinite; 
            position: relative; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
        }
        #orbitAlbums .counter { animation-duration: 95s; }
        
        @keyframes counterSpin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(-360deg); } 
        }

        .counter img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* ICONO DE LA FAMILIA - CORREGIDO (Siempre parados) */
        .family-box { 
            position: absolute; bottom: 125%; left: 50%; 
            transform: translateX(-50%); 
            display: flex; align-items: flex-end; gap: 8px; 
            opacity: 0; transition: 0.4s; padding: 12px; 
            background: rgba(0,0,0,0.85); border-radius: 15px; 
            border: 1px solid gold; pointer-events: none; 
            filter: drop-shadow(0 0 10px gold); 
        }
        .planet:hover .family-box { opacity: 1; bottom: 135%; }
        
        .fig { display: flex; flex-direction: column; align-items: center; }
        .head { width: 12px; height: 12px; background: gold; border-radius: 50%; margin-bottom: 3px; }
        .body-m { width: 20px; height: 30px; background: gold; border-radius: 5px 5px 0 0; }
        .body-f { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid gold; }
        .child { transform: scale(0.65); transform-origin: bottom; }

        /* CORAZONES HACIA EL SOL */
        .heart-bubble { 
            position: fixed; color: #ff0000; font-size: 28px; 
            pointer-events: none; z-index: 1001; 
            filter: drop-shadow(0 0 10px gold) drop-shadow(0 0 5px red); 
        }

        /* ESTRELLAS FUGACES */
        .shootingStar { position: absolute; width: 50px; height: 50px; cursor: pointer; z-index: 1002; filter: drop-shadow(0 0 12px gold); }
        .supernova { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: burst 2s forwards; }
        @keyframes burst { 0% { transform: scale(0); opacity:0; } 50% { transform: scale(2) rotate(45deg); opacity:1; box-shadow: 0 0 20px 5px gold; } 100% { transform: scale(0); opacity:0; } }

        /* REDES SOCIALES IZQUIERDA */
        .floating-social { position: absolute; top: 50%; left: 20px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .floating-social a { width: 45px; height: 45px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid gold; transition: 0.3s; }
        .floating-social a svg { width: 22px; fill: gold; }
        .floating-social a:hover { background: gold; transform: scale(1.2); }
        .floating-social a:hover svg { fill: #000; }

        /* NOMBRE DEL DISCO AL PASAR EL MOUSE */
        .tooltip { 
            position: absolute; bottom: -40px; left: 50%; 
            transform: translateX(-50%); background: black; color: gold; 
            padding: 6px 12px; font-size: 11px; border: 1px solid gold; 
            opacity: 0; white-space: nowrap; border-radius: 5px; 
        }
        .planet:hover .tooltip { opacity: 1; }

        @media (max-width: 768px) { 
            #solarSystem { transform: scale(0.4); } 
            .floating-social { left: 10px; transform: translateY(-50%) scale(0.8); } 
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Logo">
        <p>REGENERANDO GALAXIA MUSICAL...</p>
    </div>

    <div id="starContainer"></div>

    <div class="floating-social">
        <a href="https://www.youtube.com/@ReflexionMusicalMX" target="_blank"><svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg></a>
        <a href="https://www.tiktok.com/@reflexionmusicalmx" target="_blank"><svg viewBox="0 0 448 512"><path d="M448 209.9a210.1 210.1 0 0 1 -122.8-39.3V349.4A162.6 162.6 0 1 1 185 188.3V278.2a74.6 74.6 0 1 0 52.2 71.2V0l88 0a121.2 121.2 0 0 0 1.9 22.2h0A122.2 122.2 0 0 0 381 102.4a121.4 121.4 0 0 0 67 20.1z"/></svg></a>
        <a href="https://www.facebook.com/reflexionmusicalmx" target="_blank"><svg viewBox="0 0 320 512"><path d="M279.1 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.4 0 225.4 0c-73.22 0-121.1 44.38-121.1 124.7v70.62H22.89V288h81.39v224h100.2V288z"/></svg></a>
        <a href="https://www.instagram.com/reflexionmusicalmx" target="_blank"><svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8z"/></svg></a>
    </div>

    <div id="solarSystem">
        <div id="sun" onclick="location.reload()">
            <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Sol Central">
        </div>
        <div id="orbitSingles" class="orbit"></div>
        <div id="orbitAlbums" class="orbit"></div>
    </div>

    <script>
        // ELIMINAR CARGADOR
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 800);
            }, 1500);
        };

        // SUPERNOVAS ALEATORIAS
        setInterval(() => {
            const sn = document.createElement('div');
            sn.className = 'supernova';
            sn.style.left = Math.random() * 100 + '%';
            sn.style.top = Math.random() * 100 + '%';
            document.getElementById('starContainer').appendChild(sn);
            setTimeout(() => sn.remove(), 2000);
        }, 1500);

        // --- DATOS: SENCILLOS (7) ---
        const singles = [
            { nombre: "WE RISE AS ONE", imagen: "images/We rise as one.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs" },
            { nombre: "GRACIAS 2025", imagen: "images/Gracias 2025.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_l_KUB_Wa8uMY1p1Sd-DoF71MrNJqvyIXk" },
            { nombre: "ADULTOS TRASTORNADOS", imagen: "images/Adultos TRASTORNADOS.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM" },
            { nombre: "CODIGO ROJO", imagen: "images/Codigo rojo.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0" },
            { nombre: "LA FUERZA DE TODOS", imagen: "images/La fuerza de todos.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_mAVvrpFVf6aFPjow3z-a3rxnZC6IHlLro" },
            { nombre: "REGRESAR A CASA", imagen: "images/Regresar a casa.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_kNqvtfEhlByZLZFQjKdD5JXx-yyWLK7XE" },
            { nombre: "TRES COLORES", imagen: "images/Tres colores, un compromiso.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_nXLlYBO_bLe8jo9vqm2rw1JPGwIxTw9uM" }
        ];

        // --- DATOS: ÁLBUMES (10) ---
        const albums = [
            { nombre: "VOCES DE CAMBIO 1", imagen: "images/Voces de Cambio 1.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_kDigM39j6m-rN6Kuf42_rGx5FNLp1IKKQ" },
            { nombre: "VOCES DE CAMBIO 2", imagen: "images/Voces de Cambio 2.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_lbF4Fqr8ou3iExKf4vfky7PZitsEQJ3qE" },
            { nombre: "ESTADO CONTRA ESTADO", imagen: "images/Estado contra estado.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_nlsQfZZHP2bR8HfV6_N5uSvGHuFr4lEow" },
            { nombre: "LUZ ENTRE SOMBRAS", imagen: "images/Luz entre las Sombras.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_mmneexiID3nIV0Vez7QaWoE0i0PwM6S_4" },
            { nombre: "TIEMPO Y VIDA", imagen: "images/Tiempo y vida.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_mp8-UwTfhLNjECvuY7vjR8-0v3mmPr8rE" },
            { nombre: "CHACALES OPORTUNISTAS", imagen: "images/CHACALES OPORTUNISTAS.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_mHwHl-hoc9G9E6GHULqSQgO2itU2bBH_A" },
            { nombre: "TEJIDO VITAL", imagen: "images/Tejido vital.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_kUdxSJ5oZ8bZjO_p6TmdjaI_5tV0inJKs" },
            { nombre: "REVOLUCION MENTAL", imagen: "images/Revolucion mental.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_nnIdZwheNvoqdMGQwSzFUo_6W3Vxr4nbU" },
            { nombre: "ERES LO QUE ESCUCHAS", imagen: "images/Eres lo que escuchas.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_mRcy2Ln9I292iseBRcoyBCjedzlTS4X9I" },
            { nombre: "AMOR EN TIEMPOS", imagen: "images/Amor en tiempos de ideologias cancerigenas.webp", link: "https://music.youtube.com/playlist?list=OLAK5uy_kP7_3VPWPlsoggwsXy0gQ6ZFFmv9drSIA" }
        ];

        // FUNCIÓN PARA CONSTRUIR ÓRBITAS
        function createPlanets(data, containerId, radius) {
            const container = document.getElementById(containerId);
            data.forEach((item, i) => {
                const angle = (i / data.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const p = document.createElement('div');
                p.className = 'planet';
                p.style.left = `calc(50% + ${x}px - 55px)`;
                p.style.top = `calc(50% + ${y}px - 55px)`;
                
                let extraContent = "";
                // AGREGAR FAMILIA A TEJIDO VITAL
                if(item.nombre === "TEJIDO VITAL") {
                    extraContent = `
                    <div class="family-box">
                        <div class="fig"><div class="head"></div><div class="body-m"></div></div>
                        <div class="fig child"><div class="head"></div><div class="body-m"></div></div>
                        <div class="fig child"><div class="head"></div><div class="body-f"></div></div>
                        <div class="fig"><div class="head"></div><div class="body-f"></div></div>
                    </div>`;
                }

                p.innerHTML = `
                <div class="counter">
                    <img src="${item.imagen}" alt="${item.nombre}" onerror="this.src='https://via.placeholder.com/110/000?text=RM'">
                    <div class="tooltip">${item.nombre}</div>
                    ${extraContent}
                </div>`;

                // EFECTO CORAZONES PARA "AMOR EN TIEMPOS"
                if(item.nombre === "AMOR EN TIEMPOS") {
                    p.onmouseenter = () => {
                        p.hTimer = setInterval(() => {
                            const h = document.createElement('div');
                            h.className = 'heart-bubble'; h.innerHTML = '❤';
                            const rect = p.getBoundingClientRect();
                            h.style.left = (rect.left + 55) + 'px';
                            h.style.top = (rect.top + 55) + 'px';
                            document.body.appendChild(h);
                            h.animate([
                                { transform: 'scale(1)', opacity: 1 },
                                { transform: `translate(${window.innerWidth/2 - rect.left - 55}px, ${window.innerHeight/2 - rect.top - 55}px) scale(0.6)`, opacity: 1 }
                            ], { duration: 2500, easing: 'ease-out' });
                            setTimeout(() => h.remove(), 2500);
                        }, 400);
                    };
                    p.onmouseleave = () => clearInterval(p.hTimer);
                }

                p.onclick = () => window.open(item.link, "_blank");
                container.appendChild(p);
            });
        }

        // GENERAR TODO
        createPlanets(singles, "orbitSingles", 210);
        createPlanets(albums, "orbitAlbums", 360);

        // --- ESTRELLAS FUGACES (PLATAFORMAS) ---
        const platformIcons = [
            { svg: '<svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg>', url: 'https://youtube.com' },
            { svg: '<svg viewBox="0 0 640 512"><path d="M116.3 318.8c-6-1.5-12.3-2.3-18.8-2.3-37.4 0-67.8 29.3-67.8 65.5 0 36.1 30.4 65.5 67.8 65.5h414.7c42.1 0 76.2-32.9 76.2-73.4 0-40.6-34.1-73.4-76.2-73.4-6.4 0-12.5.8-18.3 2.3-13.4-53.5-62-92.4-121-92.4-55.9 0-103.5 35.1-118.8 84.1l-25.7-18.1c-19.2-13.5-43.8-21.5-70.2-21.5-63.7 0-115.3 50.8-115.3 113.3 0 16.9 3.8 33 10.6 47.4h66.3c15-43.2 55.4-74.4 104-74.4 60.5 0 109.5 48.3 109.5 107.8h46.7V174.4c0-26.6-21.6-48.2-48.2-48.2-26.6 0-48.2 21.6-48.2 48.2v206.5l-84.5-84.5-55.9 55.9 84.5 84.5V174.4c0-62 50.4-112.4 112.4-112.4s112.4 50.4 112.4 112.4v220h44.4c17.5 0 31.8 14.3 31.8 31.8s-14.3 31.8-31.8 31.8H97.5c-17.5 0-31.8-14.3-31.8-31.8s14.3-31.8 31.8-31.8h18.8z"/></svg>', url: 'https://soundcloud.com' }
        ];

        function createStar() {
            const platform = platformIcons[Math.floor(Math.random() * platformIcons.length)];
            const star = document.createElement('div');
            star.className = 'shootingStar';
            star.innerHTML = `<div style="fill:gold">${platform.svg}</div>`;
            const startX = Math.random() * window.innerWidth;
            star.style.left = startX + 'px'; 
            star.style.top = '-60px';
            document.getElementById('starContainer').appendChild(star);
            
            star.animate([
                { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
                { transform: `translate(${(Math.random()-0.5)*700}px, ${window.innerHeight + 150}px) rotate(1080deg)`, opacity: 0 }
            ], { duration: 9000, easing: 'linear' });
            
            star.onclick = () => window.open(platform.url, "_blank");
            setTimeout(() => star.remove(), 9500);
        }
        setInterval(createStar, 5000);
    </script>
</body>
</html>
