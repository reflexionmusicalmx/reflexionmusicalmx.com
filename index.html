<title>Reflex Musical MX</title>

<style>

h1{
font-family:'Montserrat', sans-serif;
font-size:38px;
margin:10px 0;
}

h2{
font-family:'Montserrat', sans-serif;
font-size:28px;
margin-top:60px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
padding:0 20px 40px 20px;
}

.card img{
width:100%;
border-radius:10px;
transition:transform .25s ease, box-shadow .25s ease;
cursor:pointer;
}

.card img:hover{
transform:scale(1.05);
box-shadow:0 0 15px #FFD700;
}

footer{
margin:40px 0;
font-size:14px;
opacity:0.8;
}

</style>
