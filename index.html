<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reflexión Musical MX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* BLOQUEO PARA MÓVILES */
        html, body { background:#000; color:#FFD700; font-family: 'Merriweather', serif; margin:0; padding:0; width: 100%; height: 100%; overflow:hidden; text-align:center; overscroll-behavior: none; touch-action: none; }
        
        #starContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 1000; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        #loader img { width: 180px; animation: pulse 2s infinite; }
        
        #bg{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; background: #000; }
        
        #solarSystem{ position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
        
        #sun{ position:absolute; width:200px; z-index:10; animation:pulse 5s infinite; cursor: pointer; transition: 0.3s; }
        #sun img{ width:100%; }
        @keyframes pulse{ 0%{filter:drop-shadow(0 0 15px gold);} 50%{filter:drop-shadow(0 0 60px gold);} 100%{filter:drop-shadow(0 0 15px gold);} }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 100000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #0a0a0a; border: 1px solid #FFD700; padding: 40px; border-radius: 15px; max-width: 650px; width: 85%; color: #ddd; line-height: 1.8; position: relative; }
        .close-modal { position: absolute; right: 25px; top: 20px; color: #FFD700; font-size: 32px; cursor: pointer; }
        
        /* ORBITAS */
        .orbit{ position:absolute; border-radius:50%; border:1px solid rgba(255,215,0,.15); pointer-events:none; }
        #orbitSingles{ width:420px; height:420px; animation:spin 45s linear infinite; }
        #orbitAlbums{ width:720px; height:720px; animation:spin 95s linear infinite; }
        @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

        /* PLANETAS */
        .planet{ position:absolute; width:110px; height:110px; border-radius:50%; cursor:pointer; transition:.3s; display:flex; align-items:center; justify-content:center; background:#000; box-shadow: 0 0 10px rgba(255,215,0,.6); pointer-events:auto; }
        .planet:hover{ transform:scale(1.3); box-shadow: 0 0 25px gold; z-index: 100; }
        .counter{ width:100%; height:100%; animation:counterSpin 45s linear infinite; position: relative; border-radius: 50%; }
        .counter img{ width:100%; height:100%; object-fit:cover; border-radius:50%; }
        #orbitAlbums .counter{ animation-duration:95s; }
        @keyframes counterSpin{ from{transform:rotate(0deg);} to{transform:rotate(-360deg);} }

        /* EFECTOS ESPECIALES */
        .family-silhouette {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            width: 140px; opacity: 0; transition: 0.5s; filter: drop-shadow(0 0 10px gold); pointer-events: none;
        }
        .planet:hover .family-silhouette { opacity: 1; }

        .heart-particle {
            position: absolute; color: gold; font-size: 20px; pointer-events: none;
            animation: floatHeart 2.5s ease-out forwards; z-index: 1001;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .tooltip { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: #FFD700; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; opacity: 0; transition: 0.3s; text-transform: uppercase; white-space: nowrap; border: 1px solid gold; }
        .planet:hover .tooltip { opacity: 1; bottom: -35px; }

        /* REDES LATERALES */
        .floating-social{ position:absolute; top:50%; left:15px; transform:translateY(-50%); display:flex; flex-direction:column; gap:15px; z-index:999; }
        .floating-social a{ background:#111; color:#FFD700; width:45px; height:45px; display:flex; align-items:center; justify-content:center; border-radius:10px; transition:.25s; padding: 10px; box-sizing: border-box; }
        .floating-social svg { fill: #FFD700; width: 100%; }
        .floating-social a:hover{ background:#FFD700; transform:scale(1.2); }
        .floating-social a:hover svg { fill: #000; }

        /* SUPERNOVAS Y ESTRELLAS */
        .supernova { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px 4px rgba(255, 215, 0, 0.8); animation: burst 2.5s ease-in-out forwards; pointer-events: none; }
        .supernova::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:2px; background:radial-gradient(circle, gold, transparent); }
        .supernova::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:2px; height:60px; background:radial-gradient(circle, gold, transparent); }
        @keyframes burst { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        @media (max-width: 768px) { #solarSystem { transform: scale(0.45); } }
    </style>
</head>
<body>
    <div id="loader">
        <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Logo">
        <p style="color:gold; margin-top:20px;">INICIANDO UNIVERSO...</p>
    </div>

    <audio id="bioAudio" src="pista-fondo.mp3" loop></audio>

    <div id="bioModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('bioModal').classList.remove('show'); document.getElementById('bioAudio').pause();">×</span>
            <h2>Reflexión Musical MX</h2>
            <p>La música también puede hacer pensar. Un proyecto para despertar conciencias en un mundo lleno de ruido.</p>
            <p style="color:gold; font-style:italic; text-align:center; font-size:20px;">¿Eres lo que escuchas?</p>
        </div>
    </div>

    <div id="bg"></div>
    <div id="starContainer"></div>

    <div class="floating-social">
        <a href="https://www.youtube.com/@ReflexionMusicalMX" target="_blank"><svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg></a>
        <a href="https://www.facebook.com/reflexionmusicalmx" target="_blank"><svg viewBox="0 0 320 512"><path d="M279.1 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.4 0 225.4 0c-73.22 0-121.1 44.38-121.1 124.7v70.62H22.89V288h81.39v224h100.2V288z"/></svg></a>
    </div>

    <div id="solarSystem">
        <div id="sun" onclick="document.getElementById('bioModal').classList.add('show'); document.getElementById('bioAudio').play();">
            <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Sun">
        </div>
        <div id="orbitSingles" class="orbit"></div>
        <div id="orbitAlbums" class="orbit"></div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').remove(), 800); }, 500);
        });

        function spawnSupernova() {
            const sn = document.createElement("div");
            sn.className = "supernova";
            sn.style.left = Math.random() * window.innerWidth + "px";
            sn.style.top = Math.random() * window.innerHeight + "px";
            document.getElementById("starContainer").appendChild(sn);
            setTimeout(() => sn.remove(), 2500);
            setTimeout(spawnSupernova, 3000);
        }
        spawnSupernova();

        const singles = [
            {img:"images/We rise as one.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs"},
            {img:"images/Gracias 2025.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_l_KUB_Wa8uMY1p1Sd-DoF71MrNJqvyIXk"},
            {img:"images/Adultos TRASTORNADOS.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM"},
            {img:"images/Codigo rojo.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0"},
            {img:"images/La fuerza de todos.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_mAVvrpFVf6aFPjow3z-a3rxnZC6IHlLro"},
            {img:"images/Regresar a casa.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_kNqvtfEhlByZLZFQjKdD5JXx-yyWLK7XE"},
            {img:"images/Tres colores, un compromiso.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_nXLlYBO_bLe8jo9vqm2rw1JPGwIxTw9uM"}
        ];

        const albums = [
            {img:"images/Voces de Cambio 1.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_kDigM39j6m-rN6Kuf42_rGx5FNLp1IKKQ"},
            {img:"images/Voces de Cambio 2.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_lbF4Fqr8ou3iExKf4vfky7PZitsEQJ3qE"},
            {img:"images/Estado contra estado.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_nlsQfZZHP2bR8HfV6_N5uSvGHuFr4lEow"},
            {img:"images/Luz entre las Sombras.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_mmneexiID3nIV0Vez7QaWoE0i0PwM6S_4"},
            {img:"images/Tiempo y vida.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_mp8-UwTfhLNjECvuY7vjR8-0v3mmPr8rE"},
            {img:"images/CHACALES OPORTUNISTAS.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_mHwHl-hoc9G9E6GHULqSQgO2itU2bBH_A"},
            {img:"images/Tejido vital.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_kUdxSJ5oZ8bZjO_p6TmdjaI_5tV0inJKs"},
            {img:"images/Revolucion mental.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_nnIdZwheNvoqdMGQwSzFUo_6W3Vxr4nbU"},
            {img:"images/Eres lo que escuchas.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_mRcy2Ln9I292iseBRcoyBCjedzlTS4X9I"},
            {img:"images/Amor en tiempos de ideologias cancerigenas.webp", link:"https://music.youtube.com/playlist?list=OLAK5uy_kP7_3VPWPlsoggwsXy0gQ6ZFFmv9drSIA"}
        ];

        function createOrbit(data, id, radius) {
            const orbit = document.getElementById(id);
            data.forEach((item, i) => {
                const angle = (i / data.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const planet = document.createElement("div");
                planet.className = "planet";
                planet.style.left = `calc(50% + ${x}px - 55px)`;
                planet.style.top = `calc(50% + ${y}px - 55px)`;
                
                const name = item.img.split('/').pop().replace('.webp', '').toUpperCase();
                planet.innerHTML = `<div class="counter"><img src="${item.img}"><div class="tooltip">${name}</div></div>`;

                // EFECTO TEJIDO VITAL (Familia)
                if(name.includes("TEJIDO VITAL")) {
                    const fam = document.createElement("img");
                    fam.src = "images/familia-silueta.webp";
                    fam.className = "family-silhouette";
                    planet.appendChild(fam);
                }

                // EFECTO AMOR... (Corazones)
                if(name.includes("AMOR EN TIEMPOS")) {
                    planet.addEventListener('mouseenter', () => {
                        planet.hInterval = setInterval(() => {
                            const h = document.createElement("div");
                            h.className = "heart-particle"; h.innerHTML = "❤";
                            h.style.left = Math.random() * 80 + "%";
                            planet.appendChild(h);
                            setTimeout(() => h.remove(), 2500);
                        }, 400);
                    });
                    planet.addEventListener('mouseleave', () => clearInterval(planet.hInterval));
                }

                planet.onclick = () => window.open(item.link, "_blank");
                orbit.appendChild(planet);
            });
        }

        createOrbit(singles, "orbitSingles", 210);
        createOrbit(albums, "orbitAlbums", 360);
    </script>
</body>
</html>
