<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflexión Musical MX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#FFD700;
font-family:'Open Sans',sans-serif;
overflow:hidden;
}

/* CENTRO SOL */

#sun{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:5;
}

#sun img{
width:180px;
animation:pulse 4s infinite ease-in-out;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* ORBITAS */

.orbit{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border:1px dashed rgba(255,215,0,0.2);
border-radius:50%;
}

#orbit-albums{
width:500px;
height:500px;
animation:spin 40s linear infinite;
}

#orbit-singles{
width:700px;
height:700px;
animation:spin 60s linear infinite reverse;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg)}
to{transform:translate(-50%,-50%) rotate(360deg)}
}

/* PLANETAS */

.planet{
position:absolute;
width:90px;
height:90px;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:transform .3s, box-shadow .3s;
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
}

.planet:hover{
transform:scale(1.2);
box-shadow:0 0 20px #FFD700;
z-index:10;
}

/* POSICIONES */

.p1{top:-45px; left:50%; transform:translateX(-50%);}
.p2{top:50%; right:-45px; transform:translateY(-50%);}
.p3{bottom:-45px; left:50%; transform:translateX(-50%);}
.p4{top:50%; left:-45px; transform:translateY(-50%);}

footer{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<div id="sun">
<img src="images/REFLEXIÓN MUSICAL MX 1.webp">
<h2>Reflexión Musical MX</h2>
</div>

<!-- ORBITA ALBUMES -->
