<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Descubre la discografía completa de Reflexión Musical MX. Escucha los últimos sencillos y álbumes.">

<title>Reflexión Musical MX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<link rel="apple-touch-icon" href="images/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:#FFD700;
font-family:'Open Sans',sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

/* FONDO */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* SISTEMA SOLAR */
#solarSystem{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition: transform 0.3s ease; 
}

/* LOGO */
#sun{
position:absolute;
width:200px;
z-index:10;
animation:pulse 5s infinite;
}

#sun img{
width:100%;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 15px gold);}
50%{filter:drop-shadow(0 0 60px gold);}
100%{filter:drop-shadow(0 0 15px gold);}
}

/* ORBITAS */
.orbit{
position:absolute;
border-radius:50%;
border:1px solid rgba(255,215,0,.15);
pointer-events:none; 
}

#orbitSingles{
width:420px;
height:420px;
animation:spin 45s linear infinite;
}

#orbitAlbums{
width:720px;
height:720px;
animation:spin 95s linear infinite;
}

#orbitSingles:hover, #orbitSingles:hover .counter,
#orbitAlbums:hover, #orbitAlbums:hover .counter {
animation-play-state: paused;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* DISCOS */
.planet{
position:absolute;
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
background:#000;
box-shadow: 0 0 10px rgba(255,215,0,.6), 0 0 30px rgba(255,215,0,.4);
pointer-events:auto; 
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
pointer-events:none;
}

.planet:hover{
transform:scale(1.3);
box-shadow: 0 0 25px gold, 0 0 60px rgba(255,215,0,.8);
z-index: 100;
}

/* CONTRA ROTACION */
.counter{
width:100%;
height:100%;
animation:counterSpin 45s linear infinite;
}

#orbitAlbums .counter{
animation-duration:95s;
}

@keyframes counterSpin{
from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}
}

/* REDES */
.floating-social{
position:fixed;
top:50%;
left:15px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:999;
}

.floating-social a{
background:#111;
color:#FFD700;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
text-decoration:none;
font-size:20px;
transition:.25s;
}

.floating-social a:hover{
background:#FFD700;
color:#000;
transform:scale(1.2);
}

/* ESTRELLAS FUGACES */
.shootingStar {
position: fixed;
width: 70px; 
height: 70px;
z-index: 1000;
cursor: pointer;
pointer-events: auto;
}

.starIconWrapper {
position: absolute;
top: 50%; left: 50%;
width: 35px; height: 35px;
transform: translate(-50%, -50%);
z-index: 2;
filter: drop-shadow(0 0 10px gold);
display: flex;
align-items: center;
justify-content: center;
}

.starIcon {
width: 100%; height: 100%;
fill: #FFD700;
pointer-events: none;
}

.tail {
position: absolute;
top: 50%; left: 50%; 
height: 3px;
background: linear-gradient(90deg, gold, transparent);
transform-origin: left center;
filter: blur(1px);
opacity: 0.8;
pointer-events: none;
}

/* DESTELLOS DE ESTRELLAS (Óptico, cruz + X) */
.supernova {
position: fixed;
width: 4px;
height: 4px;
background: #fff;
border-radius: 50%;
box-shadow: 0 0 10px 4px rgba(255, 215, 0, 0.8);
animation: burst 2.5s ease-in-out forwards;
z-index: 5;
pointer-events: none;
}

/* Rayo Largo Vertical/Horizontal (La Cruz) */
.supernova::before, .supernova::after {
content: '';
position: absolute;
background: radial-gradient(circle, gold 0%, transparent 70%);
top: 50%; left: 50%;
transform: translate(-50%, -50%);
}
.supernova::before { width: 60px; height: 2px; } /* Horizontal */
.supernova::after { width: 2px; height: 60px; } /* Vertical */

/* Rayos Cortos Diagonales (La X difuminada) */
.ray-x {
position: absolute;
width: 30px; height: 2px;
background: radial-gradient(circle, gold 0%, transparent 70%);
top: 50%; left: 50%;
transform: translate(-50%, -50%) rotate(45deg);
}
.ray-x::after {
content: '';
position: absolute;
width: 30px; height: 2px;
background: radial-gradient(circle, gold 0%, transparent 70%);
top: 0; left: 0;
transform: rotate(90deg);
}

@keyframes burst {
0% { transform: scale(0); opacity: 0; }
40% { transform: scale(1.2); opacity: 1; }
100% { transform: scale(0); opacity: 0; }
}

/* RESPONSIVIDAD */
@media (max-width: 768px) {
    #solarSystem {
        transform: scale(0.45);
    }
    .floating-social {
        transform: scale(0.8) translateY(-60%);
        left: 5px;
    }
}
</style>

</head>

<script>
document.addEventListener("DOMContentLoaded", () => {

    /* ESTRELLAS DE FONDO LIMPIO (Sin nebulosas) */
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    function setCanvasSize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
    }
    
    setCanvasSize();
    window.addEventListener('resize', setCanvasSize);

    let stars = [];
    for(let i=0; i<200; i++){
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.5,
            s: Math.random() * 0.15, 
            opacity: Math.random(),
            fadeStep: (Math.random() * 0.02) + 0.005 
        });
    }

    function drawStars(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Solo Estrellas normales
        stars.forEach(st => {
            st.opacity += st.fadeStep;
            if(st.opacity >= 1 || st.opacity <= 0.1) {
                st.fadeStep *= -1; 
            }

            ctx.fillStyle = `rgba(255, 215, 0, ${st.opacity})`;
            ctx.beginPath();
            ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
            ctx.fill();
            
            st.y += st.s;
            if(st.y > canvas.height){
                st.y = 0; 
                st.x = Math.random() * canvas.width;
            }
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    /* DESTELLOS DE ESTRELLAS (SUPERNOVAS OPTICAS) */
    function spawnSupernova() {
        const flash = document.createElement("div");
        flash.className = "supernova";
        // Añadimos los rayos X al interior
        flash.innerHTML = '<div class="ray-x"></div>'; 
        flash.style.left = (Math.random() * window.innerWidth) + "px";
        flash.style.top = (Math.random() * window.innerHeight) + "px";
        document.body.appendChild(flash);
        
        setTimeout(() => flash.remove(), 2500);
        
        // Siguiente destello entre 3 y 8 segundos
        setTimeout(spawnSupernova, 3000 + Math.random() * 5000);
    }
    setTimeout(spawnSupernova, 2000);

    /* ORBITAS */
    function createOrbit(data,id,radius){
        const orbit=document.getElementById(id)
        data.forEach((item,i)=>{
            const angle=(i/data.length)*Math.PI*2
            const x=Math.cos(angle)*radius
            const y=Math.sin(angle)*radius
            
            const planet=document.createElement("div")
            planet.className="planet"
            planet.style.left=`calc(50% + ${x}px - 55px)`
            planet.style.top=`calc(50% + ${y}px - 55px)`
            planet.onclick=()=>window.open(item.link,"_blank")
            
            const safeImgPath = encodeURI(item.img);
            const albumName = item.img.split('/').pop().replace('.webp', '');
            
            planet.innerHTML=`<div class="counter"><img src="${safeImgPath}" alt="${albumName}" onerror="this.style.opacity=0;"></div>`
            orbit.appendChild(planet)
        })
    }

    /* MUSICA */
    const singles=[
        {img:"images/We rise as one.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs"},
        {img:"images/Gracias 2025.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_l_KUB_Wa8uMY1p1Sd-DoF71MrNJqvyIXk"},
        {img:"images/Adultos TRASTORNADOS.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM"},
        {img:"images/Codigo rojo.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0"},
        {img:"images/La fuerza de todos.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mAVvrpFVf6aFPjow3z-a3rxnZC6IHlLro"},
        {img:"images/Regresar a casa.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kNqvtfEhlByZLZFQjKdD5JXx-yyWLK7XE"},
        {img:"images/Tres colores, un compromiso.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nXLlYBO_bLe8jo9vqm2rw1JPGwIxTw9uM"}
    ]

    const albums=[
        {img:"images/Voces de Cambio 1.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kDigM39j6m-rN6Kuf42_rGx5FNLp1IKKQ"},
        {img:"images/Voces de Cambio 2.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_lbF4Fqr8ou3iExKf4vfky7PZitsEQJ3qE"},
        {img:"images/Estado contra estado.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nlsQfZZHP2bR8HfV6_N5uSvGHuFr4lEow"},
        {img:"images/Luz entre las Sombras.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mmneexiID3nIV0Vez7QaWoE0i0PwM6S_4"},
        {img:"images/Tiempo y vida.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mp8-UwTfhLNjECvuY7vjR8-0v3mmPr8rE"},
        {img:"images/CHACALES OPORTUNISTAS.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mHwHl-hoc9G9E6GHULqSQgO2itU2bBH_A"},
        {img:"images/Tejido vital.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kUdxSJ5oZ8bZjO_p6TmdjaI_5tV0inJKs"},
        {img:"images/Revolucion mental.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nnIdZwheNvoqdMGQwSzFUo_6W3Vxr4nbU"},
        {img:"images/Eres lo que escuchas.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mRcy2Ln9I292iseBRcoyBCjedzlTS4X9I"},
        {img:"images/Amor en tiempos de ideologias cancerigenas.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kP7_3VPWPlsoggwsXy0gQ6ZFFmv9drSIA"}
    ]

    createOrbit(singles,"orbitSingles",210)
    createOrbit(albums,"orbitAlbums",360)

    /* ESTRELLAS FUGACES: SOLO ESTAS 6 PLATAFORMAS EXACTAS */
    const platforms=[
        // Spotify
        {svg:`<svg class="starIcon" viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.84.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.56.3z"/></svg>`,link:"https://open.spotify.com/intl-es/artist/35BPnnmePmVfFPm1FiR75c?uid=toptrack3siBQ3pehhsTrJjHuxAaNN&uri=spotify:track:3siBQ3pehhsTrJjHuxAaNN"},
        // Amazon Music (Logo 'a')
        {svg:`<svg class="starIcon" viewBox="0 0 448 512"><path d="M257.2 162.7c-48.7 1.8-169.5 15.5-169.5 117.5 0 109.5 138.3 114 183.5 43.2 6.5 10.2 35.4 37.5 45.3 46.8l53.1-46c-32.1-39.8-38.1-60.6-38.1-92.4V155c0-137.5-141.1-140.9-201.9-105.8l47.6 57.2c57.4-23.7 79.9 8.6 80 43.1zM128 289.4c0-38.1 44.2-39.6 72.5-40.8 77.4-3.1 84.8 35.8 84.8 54 0 86.8-157.3 64.8-157.3-13.2zm243.2 108.3c-71.1 53.4-142 81.6-218.6 81.6-43.5 0-84.9-10.3-122.9-29.6-14-7.1-23.9-6.5-32.9 2.5l-33.8 33.8c-7.9 7.9-5.1 14.8 1.9 19.1 48 29.5 106.6 45 170.8 45 88.5 0 166.5-35.8 226.4-90 10.9-9.9 10.1-16.4 1.4-25.1l-36.5-36.5c-7.4-7.3-16.4-7-23.2 1.3-4.2 5.1-12.7 14.5-17.6 19.3-5-4.8-16.1-14.7-20.9-19.4zm-132.6 44.1c-19.3 19.3-54.3 22.3-66 11.2-12.2-11.6-8.5-47.5 10.8-66.9 19-19.1 55.4-22 67.2-10.7 11.8 11.4 7.6 47.1-12 66.4z"/></svg>`,link:"https://music.amazon.com.mx/artists/B0FS4DQSV7/reflexi%C3%B3n-musical-mx"},
        // Apple Music
        {svg:`<svg class="starIcon" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>`,link:"https://music.apple.com/es/artist/reflexi%C3%B3n-musical-mx/1841491478"},
        // YouTube Music (Círculo de Play)
        {svg:`<svg class="starIcon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`,link:"https://music.youtube.com/channel/UCNs0aL3_I_uzJBlRGLedrdw?si=ohwohGPX0bFDOOSV"},
        // YouTube
        {svg:`<svg class="starIcon" viewBox="0 0 24 24"><path d="M21.582 6.186a2.506 2.506 0 00-1.762-1.766C18.265 4 12 4 12 4s-6.264 0-7.82.42a2.505 2.505 0 00-1.762 1.766C2 7.74 2 12 2 12s0 4.262.418 5.814a2.506 2.506 0 001.762 1.766C5.736 20 12 20 12 20s6.265 0 7.82-.42a2.506 2.506 0 001.762-1.766C22 16.262 22 12 22 12s0-4.26-.418-5.814zM9.996 15.005l.005-6 5.207 3.005-5.212 2.995z"/></svg>`,link:"https://www.youtube.com/channel/UCNs0aL3_I_uzJBlRGLedrdw"},
        // SoundCloud
        {svg:`<svg class="starIcon" viewBox="0 0 640 512"><path d="M116.3 318.8c-6-1.5-12.3-2.3-18.8-2.3-37.4 0-67.8 29.3-67.8 65.5 0 36.1 30.4 65.5 67.8 65.5h414.7c42.1 0 76.2-32.9 76.2-73.4 0-40.6-34.1-73.4-76.2-73.4-6.4 0-12.5.8-18.3 2.3-13.4-53.5-62-92.4-121-92.4-55.9 0-103.5 35.1-118.8 84.1l-25.7-18.1c-19.2-13.5-43.8-21.5-70.2-21.5-63.7 0-115.3 50.8-115.3 113.3 0 16.9 3.8 33 10.6 47.4h66.3c15-43.2 55.4-74.4 104-74.4 60.5 0 109.5 48.3 109.5 107.8h46.7V174.4c0-26.6-21.6-48.2-48.2-48.2-26.6 0-48.2 21.6-48.2 48.2v206.5l-84.5-84.5-55.9 55.9 84.5 84.5V174.4c0-62 50.4-112.4 112.4-112.4s112.4 50.4 112.4 112.4v220h44.4c17.5 0 31.8 14.3 31.8 31.8s-14.3 31.8-31.8 31.8H97.5c-17.5 0-31.8-14.3-31.8-31.8s14.3-31.8 31.8-31.8h18.8z"/></svg>`,link:"https://soundcloud.com/reflexionmusicalmx-music"}
    ]

    // LÓGICA PARA EVITAR REPETICIONES
    let availablePlatforms = [];
    function getNextPlatform() {
        if (availablePlatforms.length === 0) {
            // Cuando se terminan, vuelve a barajar los 6 originales para que nunca salgan igual
            availablePlatforms = [...platforms].sort(() => Math.random() - 0.5);
        }
        return availablePlatforms.pop();
    }

    function createStar(){
        try {
            const p = getNextPlatform(); // Toma la siguiente plataforma sin repetir
            
            const star = document.createElement("div");
            star.className = "shootingStar";
            
            star.innerHTML = `
                <div class="tail"></div>
                <div class="starIconWrapper">${p.svg}</div>
            `;
            document.body.appendChild(star);

            let startX, startY, endX, endY;
            const edge = Math.floor(Math.random() * 4); 
            const offset = 100;

            if (edge === 0) {
                startX = Math.random() * window.innerWidth; startY = -offset;
                endX = Math.random() * window.innerWidth; endY = window.innerHeight + offset;
            } else if (edge === 1) {
                startX = window.innerWidth + offset; startY = Math.random() * window.innerHeight;
                endX = -offset; endY = Math.random() * window.innerHeight;
            } else if (edge === 2) {
                startX = Math.random() * window.innerWidth; startY = window.innerHeight + offset;
                endX = Math.random() * window.innerWidth; endY = -offset;
            } else {
                startX = -offset; startY = Math.random() * window.innerHeight;
                endX = window.innerWidth + offset; endY = Math.random() * window.innerHeight;
            }
            
            star.style.left = startX + "px";
            star.style.top = startY + "px";

            const dx = endX - startX;
            const dy = endY - startY;
            const angleRad = Math.atan2(dy, dx);
            const angleDeg = angleRad * (180 / Math.PI) + 180; 

            const tail = star.querySelector('.tail');
            tail.style.width = (100 + Math.random() * 100) + "px";
            tail.style.transform = `translateY(-50%) rotate(${angleDeg}deg)`;

            star.animate([
                { transform: "translate(0, 0)", opacity: 1 },
                { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
            ], {
                duration: 12000 + Math.random() * 6000, 
                easing: "linear"
            });

            star.onclick = () => window.open(p.link, "_blank");
            setTimeout(() => star.remove(), 19000);
        } catch (error) {
            console.error("Error al crear la estrella:", error);
        }
    }

    setInterval(createStar, 4000);

});
</script>

</body>
</html>
