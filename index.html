<style>

body{
background:#000;
color:#FFD700;
font-family:'Open Sans',sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

/* FONDO */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* SISTEMA SOLAR */

#solarSystem{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition: transform 0.3s ease; 
}

/* LOGO */

#sun{
position:absolute;
width:200px;
z-index:10;
animation:pulse 5s infinite;
}

#sun img{
width:100%;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 15px gold);}
50%{filter:drop-shadow(0 0 60px gold);}
100%{filter:drop-shadow(0 0 15px gold);}
}

/* ORBITAS */

.orbit{
position:absolute;
border-radius:50%;
border:1px solid rgba(255,215,0,.15);
}

#orbitSingles{
width:420px;
height:420px;
animation:spin 45s linear infinite;
}

#orbitAlbums{
width:720px;
height:720px;
animation:spin 95s linear infinite;
}

#orbitSingles:hover, #orbitSingles:hover .counter,
#orbitAlbums:hover, #orbitAlbums:hover .counter {
animation-play-state: paused;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* DISCOS */

.planet{
position:absolute;
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:center;
background:#000;
box-shadow:
0 0 10px rgba(255,215,0,.6),
0 0 30px rgba(255,215,0,.4);
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
pointer-events:none;
}

.planet:hover{
transform:scale(1.3);
box-shadow:
0 0 25px gold,
0 0 60px rgba(255,215,0,.8);
z-index: 100;
}

/* CONTRA ROTACION */

.counter{
width:100%;
height:100%;
animation:counterSpin 45s linear infinite;
}

#orbitAlbums .counter{
animation-duration:95s;
}

@keyframes counterSpin{
from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}
}

/* REDES */

.floating-social{
position:fixed;
top:50%;
left:15px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:999;
}

.floating-social a{
background:#111;
color:#FFD700;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
text-decoration:none;
font-size:20px;
transition:.25s;
}

.floating-social a:hover{
background:#FFD700;
color:#000;
transform:scale(1.2);
}

/* ESTRELLAS FUGACES (Corrección de posicionamiento) */

.shootingStar{
position:fixed;
width:1px; /* El contenedor es un punto de origen */
height:1px;
z-index:1000;
pointer-events: none; /* No bloquear clics en el fondo */
}

.starIconWrapper {
position: absolute;
width: 40px;
height: 40px;
/* Centrar el icono sobre el punto de origen de la estrella */
transform: translate(-50%, -50%); 
cursor:pointer;
pointer-events: auto; /* Permitir clics solo en el icono */
filter:drop-shadow(0 0 10px gold);
}

.starIcon{
width:100%;
height:100%;
fill:#FFD700; /* Requerimiento: Color amarillo */
}

.tail{
position:absolute;
height:2px;
/* Nace del centro (0,0) y se extiende hacia la izquierda en su eje local rotado */
background:linear-gradient(90deg, gold, transparent); 
filter:blur(1px);
opacity:.7;
transform-origin: left center; /* Rotar desde donde nace */
}

/* RESPONSIVIDAD */
@media (max-width: 768px) {
    #solarSystem {
        transform: scale(0.45);
    }
    .floating-social {
        transform: scale(0.8) translateY(-60%);
        left: 5px;
    }
}

</style>

<script>

/* ESTRELLAS DE FONDO */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function setCanvasSize() {
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
setCanvasSize();
window.addEventListener('resize', setCanvasSize);

let stars=[];
for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
s:Math.random()*0.3
})
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="rgba(255,215,0,.9)"
stars.forEach(st=>{
ctx.beginPath()
ctx.arc(st.x,st.y,st.r,0,Math.PI*2)
ctx.fill()
st.y+=st.s
if(st.y>canvas.height){
st.y=0; st.x=Math.random()*canvas.width;
}
})
requestAnimationFrame(drawStars)
}
drawStars()

/* ORBITAS */

function createOrbit(data,id,radius){
const orbit=document.getElementById(id)
data.forEach((item,i)=>{
const angle=(i/data.length)*Math.PI*2
const x=Math.cos(angle)*radius
const y=Math.sin(angle)*radius
const planet=document.createElement("div")
planet.className="planet"
planet.style.left=`calc(50% + ${x}px - 55px)`
planet.style.top=`calc(50% + ${y}px - 55px)`
planet.onclick=()=>window.open(item.link,"_blank")
const albumName = item.img.split('/').pop().replace('.webp', '');
planet.innerHTML=`<div class="counter"><img src="${item.img}" alt="Portada de ${albumName}"></div>`
orbit.appendChild(planet)
})
}
