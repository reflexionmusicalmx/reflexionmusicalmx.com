<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reflexión Musical MX</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
}

/* CENTRO */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:5;
}

.center img{
width:180px;
animation:sunGlow 4s infinite alternate;
}

@keyframes sunGlow{
from{filter:drop-shadow(0 0 20px gold);}
to{filter:drop-shadow(0 0 60px gold);}
}

/* ORBITAS */

.orbit{
position:absolute;
top:50%;
left:50%;
border:1px dashed rgba(255,255,255,0.1);
border-radius:50%;
transform:translate(-50%,-50%);
}

.counter{
width:100%;
height:100%;
animation:counterSpin linear infinite;
pointer-events:none;
}

@keyframes counterSpin{
from{transform:rotate(360deg);}
to{transform:rotate(0deg);}
}

.planet{
position:absolute;
top:-30px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
pointer-events:auto;
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* ORBITAS ESPECIFICAS */

.orbit.albums{
width:500px;
height:500px;
animation:spin 80s linear infinite;
}

.orbit.singles{
width:320px;
height:320px;
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* BARRA REDES */

.social{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:1000;
}

.social a{
font-size:26px;
text-decoration:none;
}

/* ESTRELLAS FUGACES */

.shooting-star{
position:fixed;
width:70px;
height:70px;
cursor:pointer;
z-index:999;
animation:shoot linear forwards;
}

.shooting-star img{
width:100%;
filter:drop-shadow(0 0 10px white);
}

@keyframes shoot{
0%{opacity:0;}
10%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

function createOrbit(items,container){

const orbit=document.getElementById(container)

const total=items.length
const step=360/total

items.forEach((item,i)=>{

const angle=i*step

const planet=document.createElement("div")
planet.className="planet"
planet.style.transform=`rotate(${angle}deg) translateX(160px) rotate(-${angle}deg)`

planet.innerHTML=`<img src="${item.img}">`

planet.onclick=()=>window.open(item.link,"_blank")

orbit.appendChild(planet)

})

}

const startX=Math.random()*window.innerWidth
const startY=-100

const endX=Math.random()*window.innerWidth
const endY=window.innerHeight+100

star.style.left=startX+"px"
star.style.top=startY+"px"

star.style.animationDuration=(4+Math.random()*4)+"s"

star.innerHTML=`<img src="${p.icon}">`

star.onclick=()=>window.open(p.link,"_blank")

document.body.appendChild(star)

star.animate([
{transform:`translate(0,0)`},
{transform:`translate(${endX-startX}px,${endY-startY}px)`}
],
{duration:7000,easing:"linear"})

setTimeout(()=>{star.remove()},7000)

}
