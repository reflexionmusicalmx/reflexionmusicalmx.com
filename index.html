<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflexión Musical MX</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #111;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #000;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    section {
      padding: 40px 20px;
    }

    h2 {
      margin-bottom: 30px;
      font-size: 1.8rem;
      border-bottom: 2px solid #444;
      display: inline-block;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    a {
      text-decoration: none;
      color: white;
    }

    footer {
      padding: 20px;
      background: #000;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Reflexión Musical MX</h1>
  <p>Nuevo comienzo • Redefiniendo el futuro</p>
</header>

<section>
  <h2>Álbumes</h2>
  <div class="grid">

    <div class="card">
      <a href="https://music.youtube.com/tu-link-album-1" target="_blank">
        <img src="images/album-2026.webp" alt="Álbum 2026">
        <p>Álbum Nuevo Comienzo 2026</p>
      </a>
    </div>

  </div>
</section>

<section>
  <h2>Sencillos</h2>
  <div class="grid">

    <div class="card">
      <a href="https://music.youtube.com/tu-link-single-1" target="_blank">
        <img src="images/el-cambio.webp" alt="El Cambio">
        <p>El Cambio</p>
      </a>
    </div>

  </div>
</section>

<section>
  <h2>Videos</h2>
  <div class="grid">

    <div class="card">
      <a href="https://youtube.com/tu-video-1" target="_blank">
        <img src="images/video-el-cambio.webp" alt="Video El Cambio">
        <p>El Cambio (Video Oficial)</p>
      </a>
    </div>

  </div>
</section>

<footer>
  © 2026 Reflexión Musical MX • Todos los derechos reservados
</footer>

</body>
</html>
