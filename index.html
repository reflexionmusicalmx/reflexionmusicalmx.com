<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reflexión Musical MX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<link rel="apple-touch-icon" href="images/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#FFD700;
font-family:'Open Sans',sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

/* FONDO */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* SISTEMA SOLAR */

#solarSystem{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* LOGO */

#sun{
position:absolute;
width:200px;
z-index:10;
animation:pulse 4s infinite;
}

#sun img{
width:100%;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 10px gold);}
50%{filter:drop-shadow(0 0 40px gold);}
100%{filter:drop-shadow(0 0 10px gold);}
}

/* ORBITAS */

.orbit{
position:absolute;
border-radius:50%;
border:1px solid rgba(255,215,0,.15);
box-shadow:0 0 15px rgba(255,215,0,.2) inset;
}

#orbitSingles{
width:420px;
height:420px;
animation:spin 40s linear infinite;
}

#orbitAlbums{
width:720px;
height:720px;
animation:spin 90s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* DISCOS */

.planet{
position:absolute;
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
background:#000;
box-shadow:0 0 10px rgba(255,215,0,.5);
transition:.3s;
}

.planet:hover{
transform:scale(1.25);
box-shadow:0 0 25px #FFD700;
z-index:10;
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* CONTRA ROTACION */

.counter{
width:100%;
height:100%;
animation:counterSpin 40s linear infinite;
pointer-events:none;
}

#orbitAlbums .counter{
animation-duration:90s;
}

@keyframes counterSpin{
from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}
}

/* REDES SOCIALES */

.floating-social{
position:fixed;
top:50%;
left:15px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:999;
}

.floating-social a{
background:#111;
color:#FFD700;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
text-decoration:none;
transition:.25s;
}

.floating-social a:hover{
background:#FFD700;
color:#000;
transform:scale(1.15);
}

.floating-social svg{
width:22px;
height:22px;
}

/* ESTRELLAS FUGACES */

.shooting-star{
position:fixed;
top:-80px;
left:-80px;
width:50px;
height:50px;
z-index:999;
cursor:pointer;
animation:shoot linear forwards;
}

.shooting-star img{
width:100%;
filter:drop-shadow(0 0 8px gold);
}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translate(120vw,120vh);
opacity:0;
}

}

/* FOOTER */

footer{
position:absolute;
bottom:20px;
width:100%;
font-size:14px;
opacity:0.7;
}

/* MOVIL */

@media(max-width:768px){

#orbitAlbums{
width:520px;
height:520px;
}

#orbitSingles{
width:300px;
height:300px;
}

.planet{
width:80px;
height:80px;
}

#sun{
width:150px;
}

}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<!-- REDES -->

<div class="floating-social">

<a href="https://www.youtube.com/@ReflexionMusicalMX" target="_blank">
<svg viewBox="0 0 24 24"><path fill="currentColor" d="M23.5 6.2s-.2-1.7-.9-2.4c-.9-.9-1.9-.9-2.3-1C16.9 2.5 12 2.5 12 2.5s-4.9 0-8.3.3c-.5.1-1.5.1-2.3 1C.7 4.5.5 6.2.5 6.2S.2 8.1.2 10v2c0 1.9.3 3.8.3 3.8s.2 1.7.9 2.4c.9.9 2 .9 2.5 1C5.7 19.5 12 19.5 12 19.5s4.9 0 8.3-.3c.5-.1 1.5-.1 2.3-1 .7-.7.9-2.4.9-2.4s.3-1.9.3-3.8v-2c0-1.9-.3-3.8-.3-3.8zM9.8 14.6V7.9l6.4 3.3-6.4 3.4z"/></svg>
</a>

<a href="https://www.tiktok.com/@reflexionmusicalmx" target="_blank">
<svg viewBox="0 0 24 24"><path fill="currentColor" d="M16 2h3c.3 1.8 1.3 3.3 3 4v3c-1.6 0-3.1-.5-4-1.3V15a7 7 0 1 1-7-7c.4 0 .7 0 1 .1v3.1a4 4 0 1 0 4 3.8V2z"/></svg>
</a>

<a href="https://www.facebook.com/reflexionmusicalmx" target="_blank">
<svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 22v-8h3l1-4h-4V7c0-1.2.3-2 2-2h2V1.5C16.6 1.2 15.3 1 14 1c-3 0-5 1.8-5 5v3H6v4h3v8h4z"/></svg>
</a>

<a href="https://www.instagram.com/reflexionmusicalmx" target="_blank">
<svg viewBox="0 0 24 24"><path fill="currentColor" d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm6.5-.8a1.3 1.3 0 1 1-2.6 0 1.3 1.3 0 0 1 2.6 0z"/></svg>
</a>

</div>

<div id="solarSystem">

<div id="sun">
<img src="images/REFLEXIÓN MUSICAL MX 1.webp">
</div>

<div id="orbitSingles" class="orbit"></div>
<div id="orbitAlbums" class="orbit"></div>

</div>

<footer>Reflexión Musical MX</footer>

<script>

/* ESTRELLAS FONDO */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<120;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
speed:Math.random()*0.2

})

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="rgba(255,215,0,0.8)"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){

s.y=0
s.x=Math.random()*canvas.width

}

})

requestAnimationFrame(drawStars)

}

drawStars()

/* ESTRELLAS FUGACES PLATAFORMAS */

const platforms=[
{
icon:"https://cdn-icons-png.flaticon.com/512/174/174872.png",
link:"https://open.spotify.com"
},
{
icon:"https://cdn-icons-png.flaticon.com/512/732/732245.png",
link:"https://music.apple.com"
},
{
icon:"https://cdn-icons-png.flaticon.com/512/5968/5968906.png",
link:"https://music.amazon.com"
},
{
icon:"https://cdn-icons-png.flaticon.com/512/733/733635.png",
link:"https://soundcloud.com/reflexionmusicalmx"
}
]

function createShootingStar(){

const p=platforms[Math.floor(Math.random()*platforms.length)]

const star=document.createElement("div")

star.className="shooting-star"
star.style.animationDuration=(5+Math.random()*4)+"s"

star.innerHTML=`<img src="${p.icon}">`

star.onclick=()=>window.open(p.link,"_blank")

document.body.appendChild(star)

setTimeout(()=>{

star.remove()

},9000)

}

setInterval(createShootingStar,7000)

</script>

</body>
</html>
