<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Descubre la discografía completa de Reflexión Musical MX. Escucha los últimos sencillos y álbumes.">
    <title>Reflexión Musical MX - Universo Premium v4.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <link rel="apple-touch-icon" href="images/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           BLOQUEO Y ESTILOS BASE
           ========================================= */
        html, body {
            background: #000;
            color: #FFD700;
            font-family: 'Merriweather', serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            text-align: center;
            overscroll-behavior: none;
            touch-action: none;
        }

        /* =========================================
           PANTALLA DE CARGA (LOADER)
           ========================================= */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #111 0%, #000 100%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #loader img {
            width: 200px;
            filter: drop-shadow(0 0 15px gold);
            animation: loaderPulse 2s infinite ease-in-out;
        }

        #loader p {
            color: #FFD700;
            margin-top: 30px;
            font-weight: 700;
            letter-spacing: 5px;
            font-size: 14px;
            text-transform: uppercase;
        }

        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* =========================================
           FONDO Y CONTENEDOR DE EFECTOS
           ========================================= */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #starContainer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1000;
        }

        /* =========================================
           SISTEMA SOLAR (SOL Y ÓRBITAS)
           ========================================= */
        #solarSystem {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        #sun {
            position: absolute;
            width: 220px;
            height: 220px;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sun:hover { transform: scale(1.15); }

        #sun img {
            width: 100%;
            filter: drop-shadow(0 0 20px gold);
            animation: sunGlow 5s infinite ease-in-out;
        }

        @keyframes sunGlow {
            0%, 100% { filter: drop-shadow(0 0 15px gold) brightness(1); }
            50% { filter: drop-shadow(0 0 50px gold) brightness(1.2); }
        }

        /* Órbitas */
        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 215, 0, 0.1);
            pointer-events: none;
        }

        #orbitSingles { 
            width: 440px; height: 440px; 
            animation: spin 50s linear infinite; 
        }

        #orbitAlbums { 
            width: 780px; height: 780px; 
            animation: spin 110s linear infinite; 
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* =========================================
           DISCOS (PLANETAS)
           ========================================= */
        .planet {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            pointer-events: auto;
        }

        .planet:hover {
            transform: scale(1.35);
            box-shadow: 0 0 35px gold;
            z-index: 1000;
        }

        /* Contra-rotación para estabilidad */
        .counter {
            width: 100%;
            height: 100%;
            animation: counterSpin 50s linear infinite;
            position: relative;
            border-radius: 50%;
        }

        #orbitAlbums .counter { animation-duration: 110s; }

        @keyframes counterSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .counter img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        /* Nombres de los álbumes */
        .tooltip {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: gold;
            padding: 6px 12px;
            border: 1px solid gold;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .planet:hover .tooltip { opacity: 1; bottom: -45px; }

        /* =========================================
           EFECTOS ESPECIALES POR ÁLBUM
           ========================================= */

        /* 1. FAMILIA (TEJIDO VITAL) */
        .family-box {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            opacity: 0;
            transition: 0.4s ease-out;
            padding: 12px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid gold;
            border-radius: 15px;
            pointer-events: none;
            filter: drop-shadow(0 0 10px gold);
        }

        .planet:hover .family-box { opacity: 1; bottom: 135%; }

        /* Figuras de la familia */
        .person { display: flex; flex-direction: column; align-items: center; }
        .p-head { width: 12px; height: 12px; background: gold; border-radius: 50%; margin-bottom: 3px; }
        .p-male { width: 20px; height: 32px; background: gold; border-radius: 4px 4px 0 0; }
        .p-female { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 32px solid gold; }
        .p-child { transform: scale(0.65); transform-origin: bottom; }

        /* 2. CORAZONES (AMOR EN TIEMPOS...) */
        .heart-bubble {
            position: fixed;
            color: #ff0000;
            font-size: 26px;
            pointer-events: none;
            z-index: 2000;
            filter: drop-shadow(0 0 8px gold);
            will-change: transform, opacity;
        }

        /* =========================================
           SUPERNOVAS Y ESTRELLAS FUGACES
           ========================================= */
        
        /* Destello Supernova (Cruz y X) */
        .supernova {
            position: absolute;
            width: 2px; height: 2px;
            background: #fff;
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }

        .sn-flash { animation: snBurst 2.5s forwards; }

        @keyframes snBurst {
            0% { transform: scale(0); opacity: 0; }
            20% { opacity: 1; box-shadow: 0 0 20px 10px white, 0 0 40px 20px gold; }
            100% { transform: scale(10); opacity: 0; }
        }

        /* Cruces doradas */
        .cross {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: gold;
            pointer-events: none;
        }
        .v-line { width: 1px; height: 60px; }
        .h-line { width: 60px; height: 1px; }
        .diag { transform: translate(-50%, -50%) rotate(45deg); }

        /* Estrellas Fugaces con COLA */
        .shootingStar {
            position: absolute;
            width: 50px; height: 50px;
            cursor: pointer;
            z-index: 1100;
            pointer-events: auto;
        }

        .star-head {
            width: 35px; height: 35px;
            background: #000;
            border: 1px solid gold;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px gold;
        }

        .star-head svg { width: 22px; fill: gold; }

        .star-tail {
            position: absolute;
            right: 80%; top: 50%;
            width: 120px; height: 2px;
            background: linear-gradient(to right, transparent, gold);
            transform: translateY(-50%);
            opacity: 0.7;
        }

        /* =========================================
           REDES SOCIALES Y MODAL
           ========================================= */
        .social-dock {
            position: fixed;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10000;
        }

        .social-dock a {
            width: 48px; height: 48px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid gold;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .social-dock a svg { width: 24px; fill: gold; }

        .social-dock a:hover {
            background: gold;
            transform: scale(1.15) translateX(5px);
        }

        .social-dock a:hover svg { fill: #000; }

        /* Biografía */
        #bioModal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 85%; max-width: 600px;
            background: rgba(0,0,0,0.95);
            border: 2px solid gold;
            border-radius: 25px;
            padding: 40px;
            z-index: 100000;
            display: none;
            opacity: 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #bioModal.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .audio-bar {
            margin-top: 30px;
            background: #111;
            padding: 15px;
            border-radius: 15px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        #volRange { flex-grow: 1; accent-color: gold; }

        @media (max-width: 768px) {
            #solarSystem { transform: scale(0.42); }
            .social-dock { left: 10px; transform: translateY(-50%) scale(0.8); }
        }
    </style>
</head>

    <script>
        /* =========================================
           BASES DE DATOS (17 LANZAMIENTOS)
           ========================================= */

        const DATA_SINGLES = [
            { n: "WE RISE AS ONE", i: "images/We rise as one.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs" },

            { n: "ADULTOS TRASTORNADOS", i: "images/Adultos TRASTORNADOS.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM" },
            { n: "CODIGO ROJO", i: "images/Codigo rojo.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0" },
            { n: "LA FUERZA DE TODOS", i: "images/La fuerza de todos.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_mAVvrpFVf6aFPjow3z-a3rxnZC6IHlLro" },
            { n: "REGRESAR A CASA", i: "images/Regresar a casa.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_kNqvtfEhlByZLZFQjKdD5JXx-yyWLK7XE" },
            { n: "TRES COLORES", i: "images/Tres colores, un compromiso.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_nXLlYBO_bLe8jo9vqm2rw1JPGwIxTw9uM" }
        ];

        const DATA_ALBUMS = [
            { n: "VOCES DE CAMBIO 1", i: "images/Voces de Cambio 1.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_kDigM39j6m-rN6Kuf42_rGx5FNLp1IKKQ" },
            { n: "VOCES DE CAMBIO 2", i: "images/Voces de Cambio 2.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_lbF4Fqr8ou3iExKf4vfky7PZitsEQJ3qE" },
            { n: "ESTADO CONTRA ESTADO", i: "images/Estado contra estado.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_nlsQfZZHP2bR8HfV6_N5uSvGHuFr4lEow" },
            { n: "LUZ ENTRE LAS SOMBRAS", i: "images/Luz entre las Sombras.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_mmneexiID3nIV0Vez7QaWoE0i0PwM6S_4" },
            { n: "TIEMPO Y VIDA", i: "images/Tiempo y vida.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_mp8-UwTfhLNjECvuY7vjR8-0v3mmPr8rE" },
            { n: "CHACALES OPORTUNISTAS", i: "images/CHACALES OPORTUNISTAS.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_mHwHl-hoc9G9E6GHULqSQgO2itU2bBH_A" },
            { n: "TEJIDO VITAL", i: "images/Tejido vital.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_kUdxSJ5oZ8bZjO_p6TmdjaI_5tV0inJKs", special: "family" },
            { n: "REVOLUCION MENTAL", i: "images/Revolucion mental.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_nnIdZwheNvoqdMGQwSzFUo_6W3Vxr4nbU" },
            { n: "ERES LO QUE ESCUCHAS", i: "images/Eres lo que escuchas.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_mRcy2Ln9I292iseBRcoyBCjedzlTS4X9I" },
            { n: "AMOR EN TIEMPOS", i: "images/Amor en tiempos de ideologias cancerigenas.webp", l: "https://music.youtube.com/playlist?list=OLAK5uy_kP7_3VPWPlsoggwsXy0gQ6ZFFmv9drSIA", special: "hearts" }
        ];

        /* =========================================
           LÓGICA DEL SISTEMA
           ========================================= */

        const starContainer = document.getElementById("starContainer");
        const bioModal = document.getElementById("bioModal");
        const bioAudio = document.getElementById("bioAudio");
        const clickSound = document.getElementById("clickSound");

        // CARGA Y LOADER
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 1000);
            }, 2000);
        });

        // MODAL Y AUDIO
        function toggleBio() {
            clickSound.play();
            bioModal.classList.toggle("show");
            if (bioModal.classList.contains("show")) {
                bioAudio.play().catch(e => console.log("Audio Bloqueado"));
            } else {
                bioAudio.pause();
                bioAudio.currentTime = 0;
            }
        }

        document.getElementById("volRange").oninput = (e) => bioAudio.volume = e.target.value;
        document.getElementById("muteToggle").onclick = () => {
            bioAudio.muted = !bioAudio.muted;
            document.getElementById("muteToggle").innerText = bioAudio.muted ? "🔇" : "🔊";
        };

        // CANVAS TWINKLE STARS
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        let staticStars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            staticStars = [];
            for (let i = 0; i < 300; i++) {
                staticStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: 0.005 + Math.random() * 0.01
                });
            }
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            staticStars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity >= 1 || s.opacity <= 0.1) s.speed *= -1;
                ctx.fillStyle = `rgba(255, 215, 0, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(drawCanvas);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas(); drawCanvas();

        // SUPERNOVAS (CRUZ Y X)
        function createSupernova() {
            const sn = document.createElement('div');
            sn.className = 'supernova sn-flash';
            sn.innerHTML = `
                <div class="cross v-line"></div>
                <div class="cross h-line"></div>
                <div class="cross v-line diag"></div>
                <div class="cross h-line diag"></div>
            `;
            sn.style.left = Math.random() * 100 + '%';
            sn.style.top = Math.random() * 100 + '%';
            starContainer.appendChild(sn);
            setTimeout(() => sn.remove(), 2500);
        }
        setInterval(createSupernova, 3000);

        // ESTRELLAS FUGACES CON COLA
        const platformIcons = [
            { icon: '<svg viewBox="0 0 576 512"><path d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg>', url: 'https://youtube.com' },
            { icon: '<svg viewBox="0 0 640 512"><path d="M116.3 318.8c-6-1.5-12.3-2.3-18.8-2.3-37.4 0-67.8 29.3-67.8 65.5 0 36.1 30.4 65.5 67.8 65.5h414.7c42.1 0 76.2-32.9 76.2-73.4 0-40.6-34.1-73.4-76.2-73.4-6.4 0-12.5.8-18.3 2.3-13.4-53.5-62-92.4-121-92.4-55.9 0-103.5 35.1-118.8 84.1l-25.7-18.1c-19.2-13.5-43.8-21.5-70.2-21.5-63.7 0-115.3 50.8-115.3 113.3 0 16.9 3.8 33 10.6 47.4h66.3c15-43.2 55.4-74.4 104-74.4 60.5 0 109.5 48.3 109.5 107.8h46.7V174.4c0-26.6-21.6-48.2-48.2-48.2-26.6 0-48.2 21.6-48.2 48.2v206.5l-84.5-84.5-55.9 55.9 84.5 84.5V174.4c0-62 50.4-112.4 112.4-112.4s112.4 50.4 112.4 112.4v220h44.4c17.5 0 31.8 14.3 31.8 31.8s-14.3 31.8-31.8 31.8H97.5c-17.5 0-31.8-14.3-31.8-31.8s14.3-31.8 31.8-31.8h18.8z"/></svg>', url: 'https://soundcloud.com' }
        ];

        function spawnShootingStar() {
            const platform = platformIcons[Math.floor(Math.random() * platformIcons.length)];
            const star = document.createElement('div');
            star.className = 'shootingStar';
            star.innerHTML = `<div class="star-tail"></div><div class="star-head">${platform.icon}</div>`;
            
            const startY = Math.random() * window.innerHeight;
            star.style.top = startY + 'px';
            star.style.left = '-150px';
            starContainer.appendChild(star);

            const anim = star.animate([
                { transform: 'translateX(0) rotate(-15deg)', opacity: 0 },
                { opacity: 1, offset: 0.1 },
                { transform: `translateX(${window.innerWidth + 300}px) rotate(-15deg)`, opacity: 0.5 }
            ], { duration: 6000, easing: 'linear' });

            star.onclick = () => window.open(platform.url, '_blank');
            anim.onfinish = () => star.remove();
        }
        setInterval(spawnShootingStar, 8000);

        // FUNCIÓN CONSTRUCCIÓN ÓRBITAS
        function populateOrbit(data, orbitId, radius) {
            const orbit = document.getElementById(orbitId);
            data.forEach((item, i) => {
                const angle = (i / data.length) * (Math.PI * 2);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const planet = document.createElement('div');
                planet.className = 'planet';
                planet.setAttribute('data-album', item.n);
                planet.style.left = `calc(50% + ${x}px - 55px)`;
                planet.style.top = `calc(50% + ${y}px - 55px)`;

                const stabilizer = document.createElement('div');
                stabilizer.className = 'stabilizer';

                // Imagen
                const img = document.createElement('img');
                img.src = item.i;
                img.className = 'album-art';
                img.onerror = function() { this.src = 'https://via.placeholder.com/150/000/FFD700?text=RM'; };
                img.onclick = () => window.open(item.l, '_blank');

                const tooltip = document.createElement('div');
                tooltip.className = 'album-label';
                tooltip.innerText = item.n;

                stabilizer.appendChild(img);
                stabilizer.appendChild(tooltip);

                // EFECTO FAMILIA
                if (item.special === "family") {
                    const family = document.createElement('div');
                    family.className = 'family-container';
                    family.innerHTML = `
                        <div class="person"><div class="p-head"></div><div class="p-male"></div></div>
                        <div class="person p-child"><div class="p-head"></div><div class="p-male"></div></div>
                        <div class="person p-child"><div class="p-head"></div><div class="p-female"></div></div>
                        <div class="person"><div class="p-head"></div><div class="p-female"></div></div>
                    `;
                    stabilizer.appendChild(family);
                }

                // EFECTO CORAZONES
                if (item.special === "hearts") {
                    let heartInt;
                    planet.onmouseenter = () => {
                        heartInt = setInterval(() => {
                            const h = document.createElement('div');
                            h.className = 'heart-particle'; h.innerHTML = '❤';
                            const r = planet.getBoundingClientRect();
                            h.style.left = (r.left + 55) + 'px';
                            h.style.top = (r.top + 55) + 'px';
                            document.body.appendChild(h);

                            h.animate([
                                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                                { transform: `translate(${window.innerWidth/2 - r.left - 55}px, ${window.innerHeight/2 - r.top - 55}px) scale(0.5)`, opacity: 1, offset: 0.95 },
                                { transform: `translate(${window.innerWidth/2 - r.left - 55}px, ${window.innerHeight/2 - r.top - 55}px) scale(0)`, opacity: 0, offset: 1 }
                            ], 3000).onfinish = () => h.remove();
                        }, 500);
                    };
                    planet.onmouseleave = () => clearInterval(heartInt);
                }

                planet.appendChild(stabilizer);
                orbit.appendChild(planet);
            });
        }

        populateOrbit(DATA_SINGLES, 'orbitSingles', 220);
        populateOrbit(DATA_ALBUMS, 'orbitAlbums', 380);

    </script>
