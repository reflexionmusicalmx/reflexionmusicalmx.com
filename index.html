<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reflexión Musical MX</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body { background:#000; color:#FFD700; font-family: 'Merriweather', serif; margin:0; padding:0; width: 100%; height: 100%; overflow:hidden; position: fixed; }
        
        /* LOADER CORREGIDO */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #loader img { width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px gold); }

        #starContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #solarSystem { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 20; }

        /* SOL / LOGO */
        #sun { width: 180px; height: 180px; z-index: 100; cursor: pointer; transition: 0.3s; animation: pulse 4s infinite; }
        #sun img { width: 100%; height: 100%; object-fit: contain; }
        @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 15px gold); transform: scale(1); } 50% { filter: drop-shadow(0 0 40px gold); transform: scale(1.05); } }

        /* ORBITAS */
        .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(255, 215, 0, 0.1); pointer-events: none; }
        #orbitSingles { width: 400px; height: 400px; animation: spin 50s linear infinite; }
        #orbitAlbums { width: 700px; height: 700px; animation: spin 100s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* PLANETAS */
        .planet { position: absolute; width: 100px; height: 100px; border-radius: 50%; cursor: pointer; transition: 0.3s; pointer-events: auto; background: #000; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .planet:hover { transform: scale(1.2); z-index: 1000; box-shadow: 0 0 30px gold; }
        .counter { width: 100%; height: 100%; animation: counterSpin 50s linear infinite; border-radius: 50%; overflow: visible; position: relative; }
        #orbitAlbums .counter { animation-duration: 100s; }
        @keyframes counterSpin { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        .planet img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* TOOLTIP */
        .tooltip { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid gold; padding: 4px 8px; font-size: 10px; opacity: 0; transition: 0.3s; white-space: nowrap; pointer-events: none; }
        .planet:hover .tooltip { opacity: 1; }

        /* EFECTO CORAZONES */
        .heart-fly { position: fixed; color: gold; pointer-events: none; z-index: 1000; font-size: 20px; filter: drop-shadow(0 0 5px gold); }

        /* EFECTO FAMILIA (CSS PURO) */
        .family-box { position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; opacity: 0; transition: 0.4s; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid gold; }
        .planet:hover .family-box { opacity: 1; }
        .member { width: 10px; height: 25px; background: gold; border-radius: 5px 5px 0 0; position: relative; }
        .member::after { content: ''; position: absolute; top: -12px; left: -1px; width: 12px; height: 12px; background: gold; border-radius: 50%; }
        .child { height: 15px; transform: translateY(10px); }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 1px solid gold; padding: 30px; max-width: 500px; width: 80%; border-radius: 15px; text-align: left; }
        .close { float: right; cursor: pointer; font-size: 24px; color: gold; }

        @media (max-width: 768px) { #solarSystem { transform: scale(0.4); } }
    </style>
</head>
<body>

    <div id="loader">
        <img src="images/REFLEXIÓN MUSICAL MX 1.webp" alt="Logo" onerror="this.src='https://via.placeholder.com/150/000000/FFD700?text=RM'">
        <p>CONSTRUYENDO GALAXIA...</p>
    </div>

    <div id="starContainer"></div>

    <div id="solarSystem">
        <div id="sun" onclick="document.getElementById('modal').style.display='flex'">
            <img src="images/REFLEXIÓN MUSICAL MX 1.webp" onerror="this.style.display='none'">
        </div>
        <div id="orbitSingles" class="orbit"></div>
        <div id="orbitAlbums" class="orbit"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <h2>Reflexión Musical MX</h2>
            <p>La música es el vehículo, la conciencia es el destino. ¿Eres lo que escuchas?</p>
        </div>
    </div>

    <script>
        // Cierre forzado del loader después de 3 segundos si algo falla
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            }, 1000);
        });

        // Crear Supernovas
        function createSupernova() {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'white';
            star.style.boxShadow = '0 0 10px white';
            star.style.borderRadius = '50%';
            document.getElementById('starContainer').appendChild(star);
            
            star.animate([
                { transform: 'scale(0)', opacity: 0 },
                { transform: 'scale(2)', opacity: 1 },
                { transform: 'scale(0)', opacity: 0 }
            ], { duration: 2000 });
            
            setTimeout(() => star.remove(), 2000);
        }
        setInterval(createSupernova, 1000);

        const albums = [
            { name: "VOCES DE CAMBIO 1", img: "images/Voces de Cambio 1.webp" },
            { name: "ESTADO CONTRA ESTADO", img: "images/Estado contra estado.webp" },
            { name: "TEJIDO VITAL", img: "images/Tejido vital.webp" },
            { name: "AMOR EN TIEMPOS DE IDEOLOGIAS CANCERIGENAS", img: "images/Amor en tiempos de ideologias cancerigenas.webp" },
            { name: "REVOLUCION MENTAL", img: "images/Revolucion mental.webp" }
        ];

        const singles = [
            { name: "WE RISE AS ONE", img: "images/We rise as one.webp" },
            { name: "GRACIAS 2025", img: "images/Gracias 2025.webp" },
            { name: "CODIGO ROJO", img: "images/Codigo rojo.webp" }
        ];

        function buildOrbit(items, containerId, radius) {
            const container = document.getElementById(containerId);
            items.forEach((item, i) => {
                const angle = (i / items.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const p = document.createElement('div');
                p.className = 'planet';
                p.style.left = `calc(50% + ${x}px - 50px)`;
                p.style.top = `calc(50% + ${y}px - 50px)`;

                let extraContent = '';
                // Efecto Familia para Tejido Vital
                if(item.name.includes("TEJIDO VITAL")) {
                    extraContent = `
                        <div class="family-box">
                            <div class="member"></div><div class="member"></div>
                            <div class="member child"></div><div class="member child"></div>
                        </div>`;
                }

                p.innerHTML = `
                    <div class="counter">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/100/000000/FFD700?text=RM'">
                        <div class="tooltip">${item.name}</div>
                        ${extraContent}
                    </div>`;

                // Efecto Corazones hacia el Sol
                if(item.name.includes("AMOR EN TIEMPOS")) {
                    p.onmouseenter = () => {
                        p.interval = setInterval(() => {
                            const h = document.createElement('div');
                            h.className = 'heart-fly';
                            h.innerHTML = '❤';
                            const rect = p.getBoundingClientRect();
                            h.style.left = rect.left + 50 + 'px';
                            h.style.top = rect.top + 50 + 'px';
                            document.body.appendChild(h);

                            const destX = window.innerWidth / 2;
                            const destY = window.innerHeight / 2;

                            h.animate([
                                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                                { transform: `translate(${destX - rect.left - 50}px, ${destY - rect.top - 50}px) scale(0.5)`, opacity: 0 }
                            ], { duration: 2000, easing: 'ease-in' });

                            setTimeout(() => h.remove(), 2000);
                        }, 400);
                    };
                    p.onmouseleave = () => clearInterval(p.interval);
                }

                container.appendChild(p);
            });
        }

        buildOrbit(singles, 'orbitSingles', 200);
        buildOrbit(albums, 'orbitAlbums', 350);
    </script>
</body>
</html>
