<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reflexión Musical MX</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<link rel="apple-touch-icon" href="images/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#FFD700;
font-family:'Open Sans',sans-serif;
margin:0;
overflow:hidden;
text-align:center;
}

/* FONDO */

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* SISTEMA SOLAR */

#solarSystem{
position:relative;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* LOGO */

#sun{
position:absolute;
width:200px;
z-index:10;
animation:pulse 4s infinite;
}

#sun img{
width:100%;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 10px gold);}
50%{filter:drop-shadow(0 0 50px gold);}
100%{filter:drop-shadow(0 0 10px gold);}
}

/* ORBITAS */

.orbit{
position:absolute;
border-radius:50%;
border:1px solid rgba(255,215,0,.15);
box-shadow:
0 0 15px rgba(255,215,0,.2) inset,
0 0 20px rgba(255,215,0,.15);
}

#orbitSingles{
width:420px;
height:420px;
animation:spin 40s linear infinite;
}

#orbitAlbums{
width:720px;
height:720px;
animation:spin 90s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* DISCOS */

.planet{
position:absolute;
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
transition:.35s;
display:flex;
align-items:center;
justify-content:center;
background:#000;
pointer-events:auto;
box-shadow:
0 0 10px rgba(255,215,0,.7),
0 0 25px rgba(255,215,0,.4);
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
pointer-events:none;
}

.planet:hover{
transform:scale(1.25);
box-shadow:
0 0 25px gold,
0 0 60px rgba(255,215,0,.8);
z-index:20;
}

/* CONTRA ROTACION */

.counter{
width:100%;
height:100%;
animation:counterSpin 40s linear infinite;
pointer-events:none;
}

#orbitAlbums .counter{
animation-duration:90s;
}

@keyframes counterSpin{
from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}
}

/* REDES */

.floating-social{
position:fixed;
top:50%;
left:15px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
z-index:999;
}

.floating-social a{
background:#111;
color:#FFD700;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
text-decoration:none;
font-size:20px;
transition:.25s;
}

.floating-social a:hover{
background:#FFD700;
color:#000;
transform:scale(1.15);
}

/* ESTRELLAS FUGACES */

.shootingStar{
position:fixed;
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:1000;
}

.starIcon{
width:40px;
height:40px;
fill:white;
filter:drop-shadow(0 0 15px gold);
}

.tail{
position:absolute;
width:140px;
height:3px;
background:linear-gradient(90deg,gold,transparent);
filter:blur(2px);
transform:rotate(-35deg);
opacity:.8;
}

/* MOVIL */

@media(max-width:768px){

#orbitAlbums{width:520px;height:520px;}
#orbitSingles{width:300px;height:300px;}

.planet{width:80px;height:80px;}

#sun{width:150px;}

}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<!-- REDES -->

<div class="floating-social">

<a href="https://www.youtube.com/@ReflexionMusicalMX" target="_blank">▶</a> <a href="https://www.tiktok.com/@reflexionmusicalmx" target="_blank">♫</a> <a href="https://www.facebook.com/reflexionmusicalmx" target="_blank">f</a> <a href="https://www.instagram.com/reflexionmusicalmx" target="_blank">◎</a> <a href="https://x.com/RMusicalMX" target="_blank">X</a> <a href="https://www.threads.com/@reflexionmusicalmx" target="_blank">@</a> <a href="https://soundcloud.com/reflexionmusicalmx" target="_blank">☁</a>

</div>

<div id="solarSystem">

<div id="sun">
<img src="images/REFLEXIÓN MUSICAL MX 1.webp">
</div>

<div id="orbitSingles" class="orbit"></div>
<div id="orbitAlbums" class="orbit"></div>

</div>

<script>

/* FONDO ESTRELLAS */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
speed:Math.random()*0.3
})
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="rgba(255,215,0,0.9)"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

})

requestAnimationFrame(drawStars)

}

drawStars()

/* ORBITAS */

function createOrbit(data,orbitId,radius){

const orbit=document.getElementById(orbitId)

data.forEach((item,i)=>{

const angle=(i/data.length)*(Math.PI*2)

const x=Math.cos(angle)*radius
const y=Math.sin(angle)*radius

const planet=document.createElement("div")
planet.className="planet"

planet.style.left=`calc(50% + ${x}px - 55px)`
planet.style.top=`calc(50% + ${y}px - 55px)`

planet.innerHTML=`<div class="counter"><img src="${item.img}"></div>`

planet.addEventListener("click",()=>{
window.open(item.link,"_blank")
})

orbit.appendChild(planet)

})

}

/* MUSICA */

const singles=[

{img:"images/We rise as one.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kyLAJmShtPgqFTl1qZk8pYP-jWBFG6xJs"},
{img:"images/Gracias 2025.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_l_KUB_Wa8uMY1p1Sd-DoF71MrNJqvyIXk"},
{img:"images/Adultos TRASTORNADOS.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_k1huRyG7m9Zmd9ZUUgtTYbZpf2hqMDdNM"},
{img:"images/Codigo rojo.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_lrXeL1b_pWMQU5tSLv8CyouYZrDfkj1o0"},
{img:"images/La fuerza de todos.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mAVvrpFVf6aFPjow3z-a3rxnZC6IHlLro"},
{img:"images/Regresar a casa.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kNqvtfEhlByZLZFQjKdD5JXx-yyWLK7XE"},
{img:"images/Tres colores, un compromiso.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nXLlYBO_bLe8jo9vqm2rw1JPGwIxTw9uM"}

]

const albums=[

{img:"images/Voces de Cambio 1.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kDigM39j6m-rN6Kuf42_rGx5FNLp1IKKQ"},
{img:"images/Voces de Cambio 2.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_lbF4Fqr8ou3iExKf4vfky7PZitsEQJ3qE"},
{img:"images/Estado contra estado.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nlsQfZZHP2bR8HfV6_N5uSvGHuFr4lEow"},
{img:"images/Luz entre las Sombras.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mmneexiID3nIV0Vez7QaWoE0i0PwM6S_4"},
{img:"images/Tiempo y vida.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mp8-UwTfhLNjECvuY7vjR8-0v3mmPr8rE"},
{img:"images/CHACALES OPORTUNISTAS.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mHwHl-hoc9G9E6GHULqSQgO2itU2bBH_A"},
{img:"images/Tejido vital.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kUdxSJ5oZ8bZjO_p6TmdjaI_5tV0inJKs"},
{img:"images/Revolucion mental.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_nnIdZwheNvoqdMGQwSzFUo_6W3Vxr4nbU"},
{img:"images/Eres lo que escuchas.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_mRcy2Ln9I292iseBRcoyBCjedzlTS4X9I"},
{img:"images/Amor en tiempos de ideologias cancerigenas.webp",link:"https://music.youtube.com/playlist?list=OLAK5uy_kP7_3VPWPlsoggwsXy0gQ6ZFFmv9drSIA"}

]

createOrbit(singles,"orbitSingles",210)
createOrbit(albums,"orbitAlbums",360)

/* ESTRELLAS FUGACES */

const platforms=[

{svg:`<svg class="starIcon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/></svg>`,link:"https://open.spotify.com/intl-es/artist/35BPnnmePmVfFPm1FiR75c"},
{svg:`<svg class="starIcon" viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60"/></svg>`,link:"https://music.amazon.com.mx/artists/B0FS4DQSV7/reflexi%C3%B3n-musical-mx"},
{svg:`<svg class="starIcon" viewBox="0 0 100 100"><polygon points="30,20 80,50 30,80"/></svg>`,link:"https://www.youtube.com/channel/UCNs0aL3_I_uzJBlRGLedrdw"},
{svg:`<svg class="starIcon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="35"/></svg>`,link:"https://music.apple.com/es/artist/reflexi%C3%B3n-musical-mx/1841491478"}

]

function createStar(){

const p=platforms[Math.floor(Math.random()*platforms.length)]

const star=document.createElement("div")
star.className="shootingStar"

star.innerHTML=`<div class="tail"></div>${p.svg}`

document.body.appendChild(star)

const startX=Math.random()*window.innerWidth
const startY=-120

star.style.left=startX+"px"
star.style.top=startY+"px"

star.addEventListener("click",()=>{
window.open(p.link,"_blank")
})

const endX=startX+(Math.random()*600-300)
const endY=window.innerHeight+200

star.animate(

[
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${endX-startX}px,${endY-startY}px)`,opacity:0}
],

{duration:9000,easing:"linear"}

)

setTimeout(()=>star.remove(),9000)

}

setInterval(createStar,5000)

</script>

</body>
</html>
