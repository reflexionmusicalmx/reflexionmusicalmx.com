<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reflexion Musical MX</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
}

#universe{
position:relative;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#sun{
position:absolute;
width:140px;
height:140px;
border-radius:50%;
box-shadow:0 0 40px gold;
animation:pulse 4s infinite;
}

#sun img{
width:100%;
height:100%;
border-radius:50%;
}

@keyframes pulse{
0%{box-shadow:0 0 20px gold;}
50%{box-shadow:0 0 60px gold;}
100%{box-shadow:0 0 20px gold;}
}

/* ORBITAS */

.orbit{
position:absolute;
border:1px dashed rgba(255,255,255,0.15);
border-radius:50%;
}

#orbitSingles{
width:420px;
height:420px;
animation:rotate 45s linear infinite;
}

#orbitAlbums{
width:650px;
height:650px;
animation:rotate 90s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* PLANETAS */

.planet{
position:absolute;
width:90px;
height:90px;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:transform .3s;
}

.planet:hover{
transform:scale(1.2);
z-index:5;
}

.planet img{
width:100%;
height:100%;
object-fit:cover;
}

/* counter rotation */

.counter{
width:100%;
height:100%;
animation:counterRotate 45s linear infinite;
}

#orbitAlbums .counter{
animation-duration:90s;
}

@keyframes counterRotate{
from{transform:rotate(0deg);}
to{transform:rotate(-360deg);}
}

</style>
</head>

<body>

<div id="universe">

<!-- LOGO CENTRAL -->
<div id="sun">
<img src="images/logo.png">
</div>

<!-- ORBITA SENCILLOS -->
<div id="orbitSingles" class="orbit"></div>

<!-- ORBITA ALBUMS -->
<div id="orbitAlbums" class="orbit"></div>

</div>


<script>

/* =========================
   SENCILLOS
========================= */

const singles = [

{
img:"images/single1.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/single2.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/single3.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/single4.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/single5.jpg",
link:"https://open.spotify.com/"
}

];


/* =========================
   ALBUMS
========================= */

const albums = [

{
img:"images/album1.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/album2.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/album3.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/album4.jpg",
link:"https://open.spotify.com/"
},

{
img:"images/album5.jpg",
link:"https://open.spotify.com/"
}

];


/* =========================
   CREAR ORBITA
========================= */

function createOrbit(data, orbitId, radius){

const orbit = document.getElementById(orbitId);

data.forEach((item,i)=>{

const angle = (i/data.length)*(Math.PI*2);

const x = Math.cos(angle)*radius;
const y = Math.sin(angle)*radius;

const planet = document.createElement("div");
planet.className="planet";

planet.style.left=`calc(50% + ${x}px - 45px)`;
planet.style.top=`calc(50% + ${y}px - 45px)`;

planet.innerHTML=`
<div class="counter">
<img src="${item.img}">
</div>
`;

planet.onclick=()=>{
window.open(item.link,"_blank");
};

orbit.appendChild(planet);

});

}


/* =========================
   INICIAR
========================= */

createOrbit(singles,"orbitSingles",210);
createOrbit(albums,"orbitAlbums",325);

</script>

</body>
</html>
