<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflexión Musical MX</title>

<style>
body {
    margin: 0;
    background-color: #000000;
    color: #FFD700;
    font-family: Arial, sans-serif;
    text-align: center;
}

header {
    padding: 60px 20px;
}

.logo {
    max-width: 400px;
    width: 80%;
}

h1 {
    font-size: 3em;
    margin-top: 20px;
}

p {
    color: #ffffff;
    max-width: 600px;
    margin: 20px auto;
    line-height: 1.6;
}

.btn {
    display: inline-block;
    background-color: #FFD700;
    color: #000000;
    padding: 15px 30px;
    margin: 20px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}

.btn:hover {
    background-color: #ffcc00;
}

.crypto-box {
    border: 2px solid #FFD700;
    padding: 20px;
    margin: 20px auto;
    max-width: 600px;
    border-radius: 10px;
}

footer {
    padding: 30px;
    color: #888;
    font-size: 0.9em;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Reflexión Musical MX" class="logo">
    <h1>Reflexión Musical MX</h1>
    <p>Música que despierta conciencia y transforma el pensamiento.</p>
    <a class="btn" href="https://youtube.com" target="_blank">Escuchar Ahora</a>
</header>

<section>
    <h2>Apoya el Proyecto</h2>

    <div class="crypto-box">
        <h3>Bitcoin (BTC)</h3>
        <p>TU_DIRECCION_AQUI</p>
    </div>

</section>

<footer>
© 2026 Reflexión Musical MX
</footer>

</body>
</html>
