function setPlayerState(isPlaying) {
    const btn = document.getElementById('btnPlayPause');
    if(btn) {
        btn.innerHTML = isPlaying ? pauseIconSVG : playIconSVG;
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const loader = document.getElementById('loader');
    const modal = document.getElementById("bioModal");
    const sun = document.getElementById("sun");
    const closeBioModal = document.querySelector(".close-bio");
    const bioAudio = document.getElementById("bioAudio"); 
    const volumeSlider = document.getElementById("volumeSlider");
    const muteBtn = document.getElementById("muteBtn");
    const starContainer = document.getElementById("starContainer"); 
    const albumModal = document.getElementById("albumModal");
    const closeAlbumModal = document.querySelector(".close-album");
    const btnCerrarAlbum = document.getElementById("btnCerrarAlbum");
    const modalAlbumTitle = document.getElementById("modalAlbumTitle");
    const modalTracklist = document.getElementById("modalTracklist");
    const modalPlatforms = document.getElementById("modalPlatforms");
    const customPlayerBox = document.getElementById("customPlayerBox");
    const playerVolSlider = document.getElementById("playerVolSlider");

    if(loader) {
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
        }, 500); 
    }

    if(volumeSlider && bioAudio) {
        bioAudio.volume = volumeSlider.value;
        volumeSlider.addEventListener("input", (e) => {
            bioAudio.volume = e.target.value;
            muteBtn.textContent = bioAudio.volume == 0 ? "🔇" : "🔊";
        });
    }
    
    if(muteBtn && bioAudio) {
        muteBtn.addEventListener("click", () => {
            if (bioAudio.volume > 0) {
                bioAudio.dataset.lastVol = bioAudio.volume; 
                bioAudio.volume = 0;
                volumeSlider.value = 0;
                muteBtn.textContent = "🔇";
            } else {
                const lastVol = bioAudio.dataset.lastVol || 0.4;
                bioAudio.volume = lastVol;
                volumeSlider.value = lastVol;
                muteBtn.textContent = "🔊";
            }
        });
    }

    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    const numStars = window.innerWidth < 768 ? 80 : 300; 
    let backgroundStars = [];

    function setCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }

    function initStars() {
        backgroundStars = [];
        for (let i = 0; i < numStars; i++) {
            backgroundStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5,
                opacity: Math.random(),
                speed: 0.005 + Math.random() * 0.01
            });
        }
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        backgroundStars.forEach(s => {
            s.opacity += s.speed;
            if (s.opacity >= 1 || s.opacity <= 0.1) s.speed *= -1;
            ctx.fillStyle = `rgba(255, 215, 0, ${s.opacity})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(drawCanvas);
    }

    setCanvasSize();
    window.addEventListener('resize', setCanvasSize);
    drawCanvas();

    let currentSpawnTimeout = null;

    function removeAllSupernovas() {
        const supernovas = document.querySelectorAll('.supernova-hitbox');
        supernovas.forEach(sn => sn.remove());
    }

    function spawnSupernovaBatch() {
        removeAllSupernovas();
        for (let i = 0; i < 3; i++) {
            const hitbox = document.createElement("div");
            hitbox.className = "supernova-hitbox";
            hitbox.style.left = (Math.random() * window.innerWidth) + "px";
            hitbox.style.top = (Math.random() * window.innerHeight) + "px";
            
            const flash = document.createElement("div");
            flash.className = "supernova";
            
            hitbox.appendChild(flash);
            
            hitbox.onclick = function() {
                flash.style.animation = 'none';
                flash.style.transform = 'scale(2)';
                flash.style.opacity = '0';
                flash.style.transition = '0.3s ease-out';
                setTimeout(() => {
                    removeAllSupernovas();
                    if (currentSpawnTimeout) clearTimeout(currentSpawnTimeout);
                    spawnSupernovaBatch(); 
                }, 400);
            };
            if(starContainer) starContainer.appendChild(hitbox); 
        }
        
        currentSpawnTimeout = setTimeout(() => {

    window.renderTrack = function(index) {
        activeTrackIndexGlobal = index;
        const trackObj = activeTracksGlobal[index];
        const playerIframe = document.getElementById("playerIframeContainer");
        const customBox = document.getElementById("customPlayerBox");
        
        document.querySelectorAll('.track-link').forEach((el, i) => {
            if (i === index) el.classList.add('active-track');
            else el.classList.remove('active-track');
        });

        customBox.style.display = "flex";
        setPlayerState(false); 

        let scIframe = document.getElementById('sc-iframe-persistent');
        let scCover = document.getElementById('sc-cover-persistent');
        let ytIframe = document.getElementById('yt-iframe-persistent');
        
        if(scIframe) scIframe.style.display = "none";
        if(scCover) scCover.style.display = "none";
        if(ytIframe) ytIframe.style.display = "none";

        if (trackObj.url.includes("soundcloud.com")) {
            const encodedUrl = encodeURIComponent(trackObj.url);
            
            if (!scIframe) {
                const embedUrl = `https://w.soundcloud.com/player/?url=${encodedUrl}&color=%230028ff&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false&show_artwork=false`;
                
                playerIframe.insertAdjacentHTML('beforeend', `
                    <img src="${activeAlbumImgGlobal}" id="sc-cover-persistent" class="sc-cover-overlay" alt="Portada">
                    <iframe id="sc-iframe-persistent" scrolling="no" allow="autoplay" src="${embedUrl}" style="filter: invert(1); background-color: transparent; border: none; border-radius: 0 8px 0 0; position: absolute; top: 0; left: 140px; width: calc(100% - 140px); height: 140px; z-index: 1;"></iframe>
                `);
                
                scIframe = document.getElementById('sc-iframe-persistent');
                scCover = document.getElementById('sc-cover-persistent');
                
                if(window.SC) {
                    scWidgetGlobal = SC.Widget(scIframe);
                    scWidgetGlobal.bind(SC.Widget.Events.READY, () => {
                        scWidgetGlobal.play(); 
                        if(playerVolSlider) scWidgetGlobal.setVolume(parseInt(playerVolSlider.value, 10));
                        
                        scWidgetGlobal.bind(SC.Widget.Events.PLAY, () => setPlayerState(true));
                        scWidgetGlobal.bind(SC.Widget.Events.PAUSE, () => setPlayerState(false));
                        scWidgetGlobal.bind(SC.Widget.Events.FINISH, () => {
                            setPlayerState(false);
                            if (activeTrackIndexGlobal < activeTracksGlobal.length - 1) {
                                window.renderTrack(activeTrackIndexGlobal + 1);
                            }
                        });
                    });
                }
            } else {
                scIframe.style.display = "block";
                scCover.style.display = "block";
                scCover.src = activeAlbumImgGlobal;
                
                if(scWidgetGlobal) {
                    scWidgetGlobal.load(trackObj.url, {
                        auto_play: true,
                        color: '%230028ff',
                        hide_related: true,
                        show_comments: false,
                        show_user: false,
                        show_reposts: false,
                        show_teaser: false,
                        visual: false,
                        show_artwork: false,
                        callback: function() {
                            scWidgetGlobal.play(); 
                        }
                    });
                }
            }

        } else {
            let videoId = "";
            let vMatch = trackObj.url.match(/[?&]v=([^&]+)/);
            if(vMatch && vMatch[1]) videoId = vMatch[1];
            
            if (videoId) {
                if (!ytIframe) {
                    let embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
                    if(activePlaylistIdGlobal) embedUrl += `&list=${activePlaylistIdGlobal}`;
                    
                    playerIframe.insertAdjacentHTML('beforeend', `<iframe id="yt-iframe-persistent" width="100%" height="140" src="${embedUrl}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="border-radius: 8px 8px 0 0; position:absolute; top:0; left:0; z-index:2;"></iframe>`);
                    
                    setTimeout(() => {
                        if (window.YT && window.YT.Player) {
                            ytPlayerGlobal = new YT.Player('yt-iframe-persistent', {
                                events: {
                                    'onReady': (event) => {
                                        if(playerVolSlider) event.target.setVolume(parseInt(playerVolSlider.value, 10));
                                    },
                                    'onStateChange': (event) => {
                                        if (event.data === YT.PlayerState.PLAYING) setPlayerState(true);
                                        else if (event.data === YT.PlayerState.PAUSED) setPlayerState(false);
                                        else if (event.data === YT.PlayerState.ENDED) {
                                            setPlayerState(false);
                                            if (activeTrackIndexGlobal < activeTracksGlobal.length - 1) {
                                                window.renderTrack(activeTrackIndexGlobal + 1);
                                            }
                                        }
                                    }
                                }
                            });
                        }
                    }, 500);
                } else {
                    ytIframe.style.display = "block";
                    if (ytPlayerGlobal && typeof ytPlayerGlobal.loadVideoById === 'function') {
                        ytPlayerGlobal.loadVideoById(videoId);
                    } else {
                        let embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&enablejsapi=1`;
                        if(activePlaylistIdGlobal) embedUrl += `&list=${activePlaylistIdGlobal}`;
                        ytIframe.src = embedUrl;
                    }
                }
            } else {
                window.open(trackObj.url, "_blank");
            }
        }
    };

                ];
                
                globalPlatformsForModal.forEach(p => {
                    let platLink = item.links && item.links[p.id] ? item.links[p.id] : "";
                    
                    if (!platLink || platLink === "#") {
                        if (p.id === 'youtube') platLink = "https://music.youtube.com/channel/UCNs0aL3_I_uzJBlRGLedrdw";
                        if (p.id === 'audiomack') platLink = "https://audiomack.com/reflexion-musical-mx";
                        if (p.id === 'soundcloud') platLink = "https://soundcloud.com/reflexionmusicalmx-music";
                    }

                    if (platLink && platLink !== "#") {
                        let a = document.createElement("a");
                        a.href = platLink;
                        a.target = "_blank";
                        a.innerHTML = p.svg;
                        a.setAttribute('aria-label', `Escuchar en ${p.name}`);
                        modalPlatforms.appendChild(a);
                    }
                });
                
                albumModal.classList.add("show");
            };

            const safeImgPath = encodeURI(item.img);
            let albumName = item.img.split('/').pop().replace('.webp', '');
            planet.setAttribute('data-album', albumName.toUpperCase());

            let extraHTML = "";
            if(albumName.toUpperCase() === "TEJIDO VITAL") {
                extraHTML = `
                <div class="family-symbol-container">
                <div class="fam-fig"><div class="fam-head"></div><div class="fam-body-m"></div></div>
                <div class="fam-fig fam-child"><div class="fam-head"></div><div class="fam-body-m"></div></div>
                <div class="fam-fig fam-child"><div class="fam-head"></div><div class="fam-body-f"></div></div>
                <div class="fam-fig"><div class="fam-head"></div><div class="fam-body-f"></div></div>
                </div>`;
            }

            planet.innerHTML = `<div class="counter"><img src="${safeImgPath}" alt="${albumName}" loading="lazy" onerror="this.onerror=null; this.src='images/REFLEXIÓN MUSICAL MX 1.webp';"><div class="tooltip">${albumName}</div>${extraHTML}</div>`;

            if(albumName.toUpperCase() === "AMOR EN TIEMPOS DE IDEOLOGIAS CANCERIGENAS") {
                let hTimer;
                planet.onmouseenter = () => {
                    hTimer = setInterval(() => {
                        const h = document.createElement("div");
                        h.className = "heart-bubble";
                        h.innerHTML = "❤";
                        const rect = planet.getBoundingClientRect();
                        h.style.left = (rect.left + rect.width/2) + "px";
                        h.style.top = (rect.top + rect.height/2) + "px";
                        document.body.appendChild(h);

                        const destX = window.innerWidth / 2;
                        const destY = window.innerHeight / 2;

                        h.animate([
                            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, offset: 0 },
                            { transform: `translate(calc(-50% + ${destX - rect.left - rect.width/2}px), calc(-50% + ${destY - rect.top - rect.height/2}px)) scale(0.6)`, opacity: 1, offset: 0.95 },
                            { transform: `translate(calc(-50% + ${destX - rect.left - rect.width/2}px), calc(-50% + ${destY - rect.top - rect.height/2}px)) scale(0)`, opacity: 0, offset: 1 }
                        ], {duration: 2500, easing: 'linear'}).onfinish = () => h.remove();
                    }, 400);
                };
                planet.onmouseleave = () => clearInterval(hTimer);
            }

            fragment.appendChild(planet);
        });

        orbit.appendChild(fragment);
    }

    if (typeof singles !== 'undefined') createOrbit(singles, "orbitSingles", 210);
    if (typeof albums !== 'undefined') createOrbit(albums, "orbitAlbums", 360);

    const reflectionModal = document.getElementById("reflectionModal");
    const btnTuVoz = document.getElementById("btnTuVoz");
    const closeReflection = document.querySelector(".close-reflection");
    const reflectionForm = document.getElementById("reflectionForm");
    const reflectionStatus = document.getElementById("reflectionStatus");
    const btnSubmitReflection = document.getElementById("btnSubmitReflection");

    if(btnTuVoz) {
        btnTuVoz.onclick = () => {
            reflectionModal.classList.add("show");
            reflectionStatus.style.display = "none";
            reflectionForm.style.display = "flex";
            document.getElementById("reflectionMsg").value = "";
        };
    }

    if(closeReflection) {
        closeReflection.onclick = () => reflectionModal.classList.remove("show");
    }

    window.addEventListener('click', (event) => {
        if (event.target === reflectionModal) reflectionModal.classList.remove("show");
    });
    window.addEventListener('touchstart', (event) => {
        if (event.target === reflectionModal) reflectionModal.classList.remove("show");
    }, {passive: true});

    if(reflectionForm) {
        reflectionForm.addEventListener("submit", async function(event) {
            event.preventDefault();
            btnSubmitReflection.innerText = "ENVIANDO...";
            btnSubmitReflection.disabled = true;

            const data = new FormData(event.target);
            fetch(event.target.action, {
                method: reflectionForm.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    reflectionForm.style.display = "none";
                    reflectionStatus.style.display = "block";
                } else {
                    alert("Hubo un error al enviar el mensaje. Intenta de nuevo.");
                }
            }).catch(error => {
                alert("Error de conexión. Intenta de nuevo.");
            }).finally(() => {
                btnSubmitReflection.innerText = "ENVIAR MENSAJE";
                btnSubmitReflection.disabled = false;
            });
        });
    }

    const upcomingReleases = [
        "📖 LIBRO: ALGO ESTÁ MAL",
        "💿 NUEVO ÁLBUM",
        "🎵 PRÓXIMO SENCILLO"
    ];
    let currentCometIndex = 0;

    function spawnNextComet(){
        try {
            const releaseText = upcomingReleases[currentCometIndex];
            currentCometIndex = (currentCometIndex + 1) % upcomingReleases.length;

            const star = document.createElement("div");
            star.className = "comet-container";
            star.innerHTML = `
            <div class="comet-tail"></div>
            <div class="comet-head"></div>
            <div class="comet-text">${releaseText}</div>
            `;
            if(starContainer) starContainer.appendChild(star); 

            let startX, startY, endX, endY;
            const edge = Math.floor(Math.random() * 4); 
            const offset = 100;
            
            if (edge === 0) { startX = Math.random() * window.innerWidth; startY = -offset; endX = Math.random() * window.innerWidth; endY = window.innerHeight + offset; }
            else if (edge === 1) { startX = window.innerWidth + offset; startY = Math.random() * window.innerHeight; endX = -offset; endY = Math.random() * window.innerHeight; }
            else if (edge === 2) { startX = Math.random() * window.innerWidth; startY = window.innerHeight + offset; endX = Math.random() * window.innerWidth; endY = -offset; }
            else { startX = -offset; startY = Math.random() * window.innerHeight; endX = window.innerWidth + offset; endY = Math.random() * window.innerHeight; }

            star.style.left = startX + "px";
            star.style.top = startY + "px";

            const dx = endX - startX; 
            const dy = endY - startY;
            const angleRad = Math.atan2(dy, dx);
            const angleDeg = (angleRad * (180 / Math.PI)) + 180; 

            const tail = star.querySelector('.comet-tail');
            tail.style.transform = `translateY(-50%) rotate(${angleDeg}deg)`;

            const duration = 12000 + Math.random() * 4000;
            const anim = star.animate([
                { transform: "translate(0px, 0px)" },
                { transform: `translate(${dx}px, ${dy}px)` }
            ], { duration: duration, easing: "linear" });

            let clicked = false;
            star.onclick = () => {
                if(clicked) return;
                clicked = true;
                anim.pause();
                star.classList.add("revealed");
                setTimeout(() => {
                    star.style.opacity = '0';
                    setTimeout(() => {
                        star.remove();
                        setTimeout(spawnNextComet, 2000);
                    }, 500);
                }, 4000);
            };

            anim.onfinish = () => {
                if(!clicked) {
                    star.remove();
                    setTimeout(spawnNextComet, 1000);
                }
            };

        } catch (e) { console.error(e); }
    }

    setTimeout(spawnNextComet, 3000);

});
</script>
